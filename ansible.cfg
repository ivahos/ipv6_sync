# =============================================================================
# ansible.cfg — Ansible configuration file
# =============================================================================
#
# This file configures Ansible's behaviour for this project. Ansible looks
# for this file in the current directory first, then ~/.ansible.cfg, then
# /etc/ansible/ansible.cfg — so as long as you run ansible-playbook from
# the repo root directory, these settings will be picked up automatically.

[defaults]

# -----------------------------------------------------------------------------
# Log file
# -----------------------------------------------------------------------------
# Ansible will automatically append the output of every run to this file.
# This gives you a history of all deployments without having to remember to
# redirect output manually.
#
# Uses an absolute path since ~ expansion is not reliable in all Ansible versions.
#
# Each run is appended to the file — it is never overwritten — so you can
# scroll back through previous runs to diagnose issues.
#
# Tip: to watch the log in real time while a playbook runs:
#   tail -f ~/ansible_runs.log

log_path = /home/ivar/ansible_runs.log

# -----------------------------------------------------------------------------
# Verbosity
# -----------------------------------------------------------------------------
# Controls how much detail is included in the output and log file.
# Level 1 includes stdout/stderr from commands run on remote hosts,
# which is useful for seeing what actually happened on the target machine.
#
# Levels:
#   0 = default (task names and status only)
#   1 = includes stdout/stderr from remote commands
#   2 = includes connection details
#   3 = includes full task arguments
#   4 = includes full connection plugin details

verbosity = 0

# -----------------------------------------------------------------------------
# Inventory
# -----------------------------------------------------------------------------
# Default inventory file so you don't have to specify -i on every run.
# With this set you can run:
#   ansible-playbook ansible/site.yml --limit habba.ih36.net
# Instead of:
#   ansible-playbook -i ansible/inventory/hosts.yml ansible/site.yml --limit habba.ih36.net

inventory = ansible/inventory/hosts.yml
