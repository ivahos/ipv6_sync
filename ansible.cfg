# =============================================================================
# ansible.cfg — Ansible configuration file
# =============================================================================
#
# This file configures Ansible's behaviour for this project. Ansible looks
# for this file in the current directory first, then ~/.ansible.cfg, then
# /etc/ansible/ansible.cfg — so as long as you run ansible-playbook from
# the ansible/ directory (or specify the full path to site.yml), these
# settings will be picked up automatically.

[defaults]

# -----------------------------------------------------------------------------
# Log file
# -----------------------------------------------------------------------------
# Ansible will automatically append the output of every run to this file.
# This gives you a history of all deployments without having to remember to
# redirect output manually.
#
# The path is relative to the directory you run ansible-playbook from.
# "~/ansible_runs.log" expands to your home directory, so the log is kept
# outside the repo and won't accidentally get committed.
#
# Each run is appended to the file — it is never overwritten — so you can
# scroll back through previous runs to diagnose issues.
#
# Tip: to watch the log in real time while a playbook runs:
#   tail -f ~/ansible_runs.log

log_path = ~/ansible_runs.log

# -----------------------------------------------------------------------------
# Inventory
# -----------------------------------------------------------------------------
# Default inventory file so you don't have to specify -i on every run.
# With this set you can run:
#   ansible-playbook site.yml --limit habba.ih36.net
# Instead of:
#   ansible-playbook -i inventory/hosts.yml site.yml --limit habba.ih36.net

inventory = ansible/inventory/hosts.yml
