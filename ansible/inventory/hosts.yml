# inventory/hosts.yml
#
# Add your hosts here. Group them by platform so the role can apply
# the correct tasks for each OS.
#
# Example:
#   ansible_host: the IP or hostname Ansible uses to connect
#   ansible_user: the SSH user (must have sudo access)
#
# Ansible will detect the OS automatically (via ansible_os_family /
# ansible_distribution) — the groups here are just for your organisation.

all:
  children:

    linux:
      hosts:
        # example-linux-host:
        #   ansible_host: 192.168.1.10
        #   ansible_user: ubuntu
        #
        # example-linux-host-2:
        #   ansible_user: admin

    raspberry_pi:
      # Raspberry Pi hosts running Debian/Raspberry Pi OS.
      # Booted from SD card or USB stick: full NVMe migration sequence runs.
      # Already booted from NVMe: normal live ipv6_dns_sync install instead.
      #
      # Add each Pi here AND under 'linux' so it gets both the ipv6_dns_sync
      # role and the raspberry_pi role.
      #
      # Optional per-host overrides (set in host_vars/<hostname>.yml):
      #   nvme_device:    block device path (default: /dev/nvme0n1)
      #   nvme_partition: partition path    (default: /dev/nvme0n1p2)
      #
      # example-pi:
      #   ansible_host: 192.168.1.30
      #   ansible_user: pi
      hosts: {}

    macos:
      hosts:
        # example-mac-host:
        #   ansible_host: 192.168.1.20
        #   ansible_user: ivar

    r8152:
      # Hosts with a Realtek USB network adapter that needs the out-of-tree
      # r8152 driver. Does not have to be a Raspberry Pi -- any Linux host
      # with an r8152/r8153/r8156/r8157 USB adapter can be added here.
      # Note: for Raspberry Pi hosts the driver is also installed into the
      # NVMe chroot automatically as part of the raspberry_pi role.
      #
      # example-host:
      #   ansible_host: 192.168.1.30
      #   ansible_user: ivar
      hosts: {}
