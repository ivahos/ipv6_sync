---
# =============================================================================
# site-macos.yml — Full macOS deployment (bootstrap + install)
# =============================================================================
#
# Convenience playbook that chains the bootstrap and main deployment together.
# Use this instead of running site-bootstrap-macos.yml and site.yml separately.
#
# The bootstrap step is safe to run multiple times — if Homebrew is already
# installed it skips cleanly. So you can use this playbook for both fresh
# installs and redeployments.
#
# Usage:
#   ansible-playbook ansible/site-macos.yml --limit virtualmac.ih36.net

- import_playbook: site-bootstrap-macos.yml
- import_playbook: site.yml
