---
# =============================================================================
# site-bootstrap-macos.yml — One-time macOS bootstrap playbook
# =============================================================================
#
# Run this ONCE on a fresh macOS host BEFORE running site.yml.
# It installs Homebrew and Python 3 via SSH from the Ansible controller,
# running as the regular user (not root) as Homebrew requires.
#
# This playbook does NOT need Python on the remote host — it runs entirely
# via local SSH commands from the controller. That's why it can bootstrap
# a fresh Mac that doesn't have Xcode CLT or Python yet.
#
# After this completes, run the main playbook as normal:
#   ansible-playbook ansible/site.yml --limit myhostname
#
# Usage:
#   ansible-playbook ansible/site-bootstrap-macos.yml --limit virtualmac.ih36.net

- name: Bootstrap macOS host
  hosts: macos
  gather_facts: false   # Skip fact gathering — Python may not be available yet
  become: false         # Run as regular user — Homebrew refuses to run as root

  tasks:

    # -------------------------------------------------------------------------
    # Check SSH connectivity
    # -------------------------------------------------------------------------
    # Test that the controller can SSH to the Mac as the regular user before
    # trying anything else. Gives a clear error message if SSH isn't set up.
    #
    # -o BatchMode=yes  — don't prompt for passwords, fail immediately instead
    # -o ConnectTimeout=5 — don't hang if the host is unreachable

    - name: Check SSH connectivity from controller to Mac
      local_action:
        module: command
        cmd: ssh -o BatchMode=yes -o ConnectTimeout=5 {{ ansible_user }}@{{ inventory_hostname }} echo ok
      register: ssh_check
      changed_when: false
      failed_when: false

    - name: Fail with helpful message if SSH not working
      fail:
        msg: >
          Cannot SSH to {{ inventory_hostname }} as {{ ansible_user }} without a password.
          Please add your public SSH key to ~/.ssh/authorized_keys on the Mac and rerun.
          On the Mac run:
            mkdir -p ~/.ssh
            curl https://github.com/{{ ansible_user }}.keys >> ~/.ssh/authorized_keys
            chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys
      when: ssh_check.rc != 0

    # -------------------------------------------------------------------------
    # Run the Homebrew bootstrap script via SSH
    # -------------------------------------------------------------------------
    # Pipes the bootstrap script into bash on the remote Mac via SSH.
    # Homebrew's own installer handles Xcode CLT installation automatically.
    # If Homebrew is already installed the script skips it cleanly.
    #
    # "stdin" passes the script content to bash on the remote host.
    # "changed_when" checks the output to avoid reporting a change if
    # Homebrew was already installed.

    - name: Install Homebrew and Python 3 on Mac (via SSH from controller)
      local_action:
        module: command
        cmd: ssh {{ ansible_user }}@{{ inventory_hostname }} 'bash -s'
        stdin: "{{ lookup('file', playbook_dir + '/../scripts/bootstrap-macos.sh') }}"
      register: brew_bootstrap
      changed_when: "'already installed' not in brew_bootstrap.stdout"

    - name: Show bootstrap output
      debug:
        msg: "{{ brew_bootstrap.stdout_lines }}"
      when: brew_bootstrap.stdout_lines is defined
