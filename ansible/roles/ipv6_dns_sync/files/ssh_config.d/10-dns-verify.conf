# /etc/ssh/ssh_config.d/10-dns-verify.conf
#
# Enable DNSSEC-based SSHFP host key verification for all hosts.
# When a host publishes SSHFP records in DNS and they are validated by
# DNSSEC, the SSH client will trust them without a known_hosts prompt.
# Falls back to normal known_hosts behaviour if no SSHFP records exist.
#
# Deployed by ipv6_sync ansible role.

Host *
    VerifyHostKeyDNS yes
