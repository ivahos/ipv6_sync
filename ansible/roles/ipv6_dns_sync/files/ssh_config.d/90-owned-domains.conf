# /etc/ssh/ssh_config.d/90-owned-domains.conf
#
# For domains you own and manage DNS for (with DNSSEC and SSHFP records),
# you can enforce strict SSHFP verification and disable known_hosts entirely.
# This means SSH will trust SSHFP records from DNS and never prompt about
# known_hosts -- but ONLY if your DNS is correctly configured with DNSSEC
# and up-to-date SSHFP records for all your hosts.
#
# HOW TO USE:
#   1. Uncomment the Host block below
#   2. Replace the example domains with your own domains
#   3. Re-run the ansible playbook to deploy the updated file
#
# REQUIREMENTS before enabling:
#   - Your zones must be DNSSEC-signed
#   - SSHFP records must be published for all hosts in these domains
#   - ipv6_dns_sync must be running on all hosts to keep AAAA/PTR current
#   - You must have run your DNS scanner to publish current SSHFP records
#
# WARNING: if SSHFP records are missing or wrong for a host in these domains,
# SSH connections to that host will fail with a verification error.
# Only add domains where you are confident all hosts have correct SSHFP records.

# Uncomment and customise the block below:
#
# Host *.example.com *.example.net *.yourdomain.org
#     VerifyHostKeyDNS yes
#     StrictHostKeyChecking yes
#     UserKnownHostsFile /dev/null
#     GlobalKnownHostsFile /dev/null
