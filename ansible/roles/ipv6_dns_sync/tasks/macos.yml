---
# =============================================================================
# tasks/macos.yml — macOS specific tasks
# =============================================================================
#
# This file is included by main.yml when the target host is macOS (Darwin).
# It installs dependencies, sets up a Python virtual environment with the
# required macOS-specific modules, deploys files, and loads the launchd daemon.
# All tasks run as root (inherited from "become: true" in site.yml).

# =============================================================================
# PREFLIGHT CHECKS
# =============================================================================

# -----------------------------------------------------------------------------
# Check internet connectivity
# -----------------------------------------------------------------------------
# Several steps below require internet access:
#   - Homebrew and Python 3 are downloaded during bootstrap
#   - PyObjC packages are downloaded from PyPI
#
# We check this upfront with a single ping so the playbook fails immediately
# with a clear message rather than hanging or failing mid-way through with a
# confusing error. 1.1.1.1 is Cloudflare's public DNS resolver — a reliable
# host to ping that is unlikely to be blocked.
#
# "changed_when: false" tells Ansible this task never changes anything on
# the host (a ping is read-only), so it won't be counted as a change in the
# play recap.
# "failed_when: internet_check.rc != 0" means fail the task if ping returns
# a non-zero exit code (i.e. the host is not reachable).

- name: Check internet connectivity (required for Xcode CLT and PyObjC packages)
  command: ping -c 1 1.1.1.1
  register: internet_check
  changed_when: false
  failed_when: internet_check.rc != 0

# =============================================================================
# XCODE COMMAND LINE TOOLS
# =============================================================================
# Homebrew (installed in Stage 1 of site.yml) normally handles CLT installation
# automatically. These tasks are a safety net for cases where CLT may still
# be missing after the bootstrap — for example if Homebrew was already
# installed but CLT was not.
#
# If CLT is already installed all tasks in this section are skipped.

# -----------------------------------------------------------------------------
# Check if CLT is already installed
# -----------------------------------------------------------------------------
# "xcode-select -p" prints the path to the active developer tools directory
# and exits 0 if CLT is installed, or exits non-zero if not.
#
# "register: xcode_clt" saves the result (including the exit code as .rc)
# so subsequent tasks can check it with "when: xcode_clt.rc != 0".
# "failed_when: false" prevents Ansible from treating a non-zero exit as a
# failure — we handle it ourselves in the tasks below.

- name: Check if Xcode Command Line Tools are installed
  command: xcode-select -p
  register: xcode_clt
  changed_when: false
  failed_when: false

# -----------------------------------------------------------------------------
# Trigger the headless CLT install
# -----------------------------------------------------------------------------
# Creating this specific file tells macOS's software update mechanism to
# include Xcode CLT in the list of available updates returned by
# "softwareupdate -l". Without it, CLT won't appear in the list.
# This is the same trick Homebrew uses when it installs CLT automatically.
#
# All tasks with "when: xcode_clt.rc != 0" are skipped entirely if CLT is
# already installed, making this section idempotent.

- name: Trigger headless Xcode Command Line Tools install
  command: touch /tmp/.com.apple.dt.CommandLineTools.installondemand.in-progress
  when: xcode_clt.rc != 0

# -----------------------------------------------------------------------------
# Find the CLT package name
# -----------------------------------------------------------------------------
# "softwareupdate -l" lists available software updates. We grep for the
# Command Line Tools entry and extract its exact package name, which changes
# with each macOS version (e.g. "Command Line Tools for Xcode-15.0").
# We need the exact name to pass to "softwareupdate -i" in the next task.
#
# "shell" is used instead of "command" here because we need pipe (|) and
# other shell features. The result is saved in xcode_pkg.stdout.

- name: Find Xcode Command Line Tools package name
  shell: |
    softwareupdate -l 2>/dev/null | grep -i "command line tools" | tail -1 | sed 's/^[[:space:]]*//' | sed 's/^\* //'
  register: xcode_pkg
  when: xcode_clt.rc != 0
  changed_when: false

# -----------------------------------------------------------------------------
# Install CLT
# -----------------------------------------------------------------------------
# "softwareupdate -i" installs the named package. This downloads CLT from
# Apple's servers and installs it silently — no GUI popup. This can take
# a few minutes depending on internet speed, so don't be alarmed if the
# playbook appears to hang here briefly.

- name: Install Xcode Command Line Tools
  command: softwareupdate -i "{{ xcode_pkg.stdout }}" --verbose
  when: xcode_clt.rc != 0 and xcode_pkg.stdout != ""

# -----------------------------------------------------------------------------
# Clean up the trigger file
# -----------------------------------------------------------------------------
# Remove the trigger file we created earlier regardless of whether the
# install succeeded, so it doesn't interfere with future softwareupdate runs.

- name: Remove Xcode CLT install trigger file
  file:
    path: /tmp/.com.apple.dt.CommandLineTools.installondemand.in-progress
    state: absent
  when: xcode_clt.rc != 0

# =============================================================================
# PYTHON VIRTUAL ENVIRONMENT
# =============================================================================
# The macOS watcher script (ipv6_dns_watch_macos.py) uses two Python modules
# from the PyObjC bridge library to receive macOS system notifications:
#   - SystemConfiguration: to watch for network interface IPv6 changes
#   - CoreFoundation: to run the macOS event loop (CFRunLoop)
#
# These are not part of the Python standard library, so we install them into
# a dedicated virtual environment (venv) at a fixed system-wide path
# (/opt/ipv6-dns-sync/venv). Using a venv keeps these packages isolated from
# the system Python and any other Python projects on the machine.
#
# The launchd plist is templated to point to the Python binary inside this
# venv, so the watcher script always runs with the right dependencies.

# -----------------------------------------------------------------------------
# Create the venv directory
# -----------------------------------------------------------------------------
# We create the parent directory first before creating the venv inside it.
# mode "0755" means root owns and can write it; everyone can read and enter.

- name: Create venv directory
  file:
    path: "{{ ipv6_venv_path }}"
    state: directory
    owner: root
    mode: "0755"

# -----------------------------------------------------------------------------
# Create the venv
# -----------------------------------------------------------------------------
# "python3 -m venv <path>" creates a self-contained Python environment at
# the given path with its own pip and site-packages directory.
#
# "creates: ..." is an idempotency guard — if the file already exists,
# Ansible skips this task. This avoids recreating the venv on every run.

- name: Create Python venv for macOS watcher
  command: "{{ ipv6_homebrew_python }} -m venv {{ ipv6_venv_path }}"
  args:
    creates: "{{ ipv6_venv_path }}/bin/python3"

# -----------------------------------------------------------------------------
# Install PyObjC packages into the venv
# -----------------------------------------------------------------------------
# pip installs the pyobjc meta-package which includes all framework bindings.
# On newer PyObjC versions (11+) the individual framework packages
# (SystemConfiguration, CoreFoundation etc) are bundled into the main
# pyobjc package rather than being separately installable.
# "state: present" means install if not already installed.
# Ansible's pip module automatically uses the venv's pip when virtualenv
# is specified.

- name: Install PyObjC packages into venv
  pip:
    name:
      - pyobjc
    virtualenv: "{{ ipv6_venv_path }}"
    state: present

# =============================================================================
# FILES
# =============================================================================

# -----------------------------------------------------------------------------
# Create the cache directory
# -----------------------------------------------------------------------------
# Same purpose as on Linux — stores state.json and cached_config.json.
# On macOS the root home directory is /var/root (not /root as on Linux),
# so the cache path is /var/root/.cache/ipv6_dns_sync.

- name: Create cache directory
  file:
    path: "{{ ipv6_cache_dir_macos }}"
    state: directory
    owner: root
    mode: "0700"

# -----------------------------------------------------------------------------
# Deploy the TSIG key file
# -----------------------------------------------------------------------------
# Same as Linux but written to /var/root/.mykey (macOS root home).
# See linux.yml for a full explanation of TSIG keys.

- name: Deploy TSIG key file
  template:
    src: mykey.j2
    dest: "{{ ipv6_keyfile_macos }}"
    owner: root
    mode: "0600"

# -----------------------------------------------------------------------------
# Deploy the macOS watcher script
# -----------------------------------------------------------------------------
# ipv6_dns_watch_macos.py uses the macOS SystemConfiguration framework to
# receive notifications when IPv6 addresses change on any network interface.
# It runs in a CFRunLoop (macOS event loop) and calls ipv6_dns_sync.py
# whenever a relevant change is detected.

- name: Copy ipv6_dns_watch_macos.py to /usr/local/bin
  copy:
    src: "{{ playbook_dir }}/../usr/local/bin/ipv6_dns_watch_macos.py"
    dest: /usr/local/bin/ipv6_dns_watch_macos.py
    owner: root
    mode: "0755"

# =============================================================================
# SERVICE
# =============================================================================

# -----------------------------------------------------------------------------
# Deploy the launchd plist
# -----------------------------------------------------------------------------
# On macOS, launchd is the equivalent of systemd — it manages background
# services (called daemons). Services are configured via plist (property list)
# XML files placed in /Library/LaunchDaemons/ for system-wide root daemons.
#
# We use a Jinja2 template rather than a static file because the plist needs
# to reference the correct path to the Python binary inside our venv, which
# is stored in the ipv6_venv_path variable.
#
# "notify: Reload launchd plist" triggers the handler in handlers/main.yml
# which unloads and reloads the plist if it has changed, so launchd picks up
# any updates to the configuration.

- name: Deploy launchd plist (templated with venv path)
  template:
    src: au.hosteng.ipv6-dns-watch.plist.j2
    dest: /Library/LaunchDaemons/au.hosteng.ipv6-dns-watch.plist
    owner: root
    mode: "0644"
  notify: Reload launchd plist

# -----------------------------------------------------------------------------
# Deploy the shutdown cleanup plist
# -----------------------------------------------------------------------------
# A separate one-shot launchd job that runs the sync script with --shutdown
# when the system shuts down. This is more reliable than catching SIGTERM
# in the watcher daemon, as launchd does not guarantee SIGTERM delivery to
# KeepAlive daemons on subsequent shutdowns after the first.

- name: Copy ipv6_dns_shutdown_hook.sh to /usr/local/bin
  copy:
    src: "{{ playbook_dir }}/../usr/local/bin/ipv6_dns_shutdown_hook.sh"
    dest: /usr/local/bin/ipv6_dns_shutdown_hook.sh
    owner: root
    mode: "0755"

- name: Deploy shutdown cleanup plist
  template:
    src: au.hosteng.ipv6-dns-shutdown.plist.j2
    dest: /Library/LaunchDaemons/au.hosteng.ipv6-dns-shutdown.plist
    owner: root
    mode: "0644"

- name: Load shutdown cleanup plist
  shell: |
    launchctl bootout system /Library/LaunchDaemons/au.hosteng.ipv6-dns-shutdown.plist 2>/dev/null || true
    launchctl bootstrap system /Library/LaunchDaemons/au.hosteng.ipv6-dns-shutdown.plist
  ignore_errors: true

# -----------------------------------------------------------------------------
# Load the launchd service
# -----------------------------------------------------------------------------
# Uses the modern launchctl bootstrap/bootout commands instead of the
# deprecated load/unload. bootstrap starts the service and registers it
# with launchd to start at boot. bootout first ensures a clean state in
# case the plist was previously loaded without the service running properly.
#
# "|| true" after bootout means don't fail if the service isn't loaded yet
# (e.g. on a fresh install). ignore_errors handles any other edge cases.

- name: Ensure launchd service is loaded
  shell: |
    launchctl bootout system /Library/LaunchDaemons/au.hosteng.ipv6-dns-watch.plist 2>/dev/null || true
    launchctl bootstrap system /Library/LaunchDaemons/au.hosteng.ipv6-dns-watch.plist
  ignore_errors: true

# -----------------------------------------------------------------------------
# Configure sshd UseDNS
# -----------------------------------------------------------------------------
# Same rationale as linux.yml -- with ipv6_dns_sync keeping PTR records
# current, reverse DNS lookups on connecting clients always resolve correctly.
# On macOS the sshd service is managed by launchd under the label
# com.openssh.sshd -- we restart it via launchctl rather than systemd.

- name: Set UseDNS yes in sshd_config
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*UseDNS'
    line: 'UseDNS yes'
    state: present
  notify: Reload sshd (macOS)

# -----------------------------------------------------------------------------
# Configure SSH client VerifyHostKeyDNS (system OpenSSH)
# -----------------------------------------------------------------------------
# Same logic as linux.yml: check for an Include directive in ssh_config
# and either deploy drop-in files or modify ssh_config directly.
# Note: the macOS system OpenSSH has a bug treating all SSHFP records as
# untrusted -- the Homebrew OpenSSH tasks below are what actually matters.
# We still configure the system OpenSSH for completeness.

- name: Check whether system ssh_config includes ssh_config.d
  command: grep -qE '^\s*Include.*ssh_config\.d' /etc/ssh/ssh_config
  register: mac_ssh_config_has_include
  changed_when: false
  failed_when: false

- name: Ensure /etc/ssh/ssh_config.d exists
  file:
    path: /etc/ssh/ssh_config.d
    state: directory
    owner: root
    mode: "0755"
  when: mac_ssh_config_has_include.rc == 0

- name: Deploy 10-dns-verify.conf to system ssh_config.d
  copy:
    src: "{{ playbook_dir }}/roles/ipv6_dns_sync/files/ssh_config.d/10-dns-verify.conf"
    dest: /etc/ssh/ssh_config.d/10-dns-verify.conf
    owner: root
    mode: "0644"
  when: mac_ssh_config_has_include.rc == 0

- name: Deploy 90-owned-domains.conf to system ssh_config.d
  copy:
    src: "{{ playbook_dir }}/roles/ipv6_dns_sync/files/ssh_config.d/90-owned-domains.conf"
    dest: /etc/ssh/ssh_config.d/90-owned-domains.conf
    owner: root
    mode: "0644"
    force: false
  when: mac_ssh_config_has_include.rc == 0

- name: Set VerifyHostKeyDNS yes in system ssh_config (fallback)
  lineinfile:
    path: /etc/ssh/ssh_config
    regexp: '^#?\s*VerifyHostKeyDNS'
    line: '    VerifyHostKeyDNS yes'
    state: present
  when: mac_ssh_config_has_include.rc != 0

# -----------------------------------------------------------------------------
# Homebrew OpenSSH configuration (if installed)
# -----------------------------------------------------------------------------
# The macOS system OpenSSH has a bug where SSHFP records are always treated
# as untrusted regardless of DNSSEC validation status, making VerifyHostKeyDNS
# ineffective. Homebrew OpenSSH is the correct version to use for SSHFP.
#
# Homebrew installs to different prefixes depending on architecture:
#   Apple Silicon: /opt/homebrew
#   Intel:         /usr/local
#
# We check both locations and update whichever sshd_config and ssh_config
# files exist under Homebrew's etc/ssh/ directory.
#
# Note: Homebrew OpenSSH's sshd is typically run as a separate service from
# the system sshd. If the user has switched to Homebrew sshd, updating its
# config and reloading it ensures UseDNS yes takes effect there too.

- name: Check for Homebrew OpenSSH on Apple Silicon
  stat:
    path: /opt/homebrew/etc/ssh
  register: brew_ssh_arm

- name: Check for Homebrew OpenSSH on Intel
  stat:
    path: /usr/local/etc/ssh
  register: brew_ssh_intel

- name: Set Homebrew SSH config paths
  # Build a list of Homebrew SSH config directories that actually exist AND
  # are not symlinks pointing to /etc/ssh. If a Homebrew config dir is
  # symlinked to /etc/ssh it is the same files we already updated above --
  # including it in the loop would just run lineinfile twice on the same
  # file, which is harmless but redundant. We exclude it so the tasks are
  # clean on both setups:
  #   - Separate directories: both /etc/ssh and the Homebrew dir are updated
  #   - Symlinked:            only /etc/ssh is updated (via the system tasks)
  set_fact:
    brew_ssh_dirs: >-
      {{
        (
          ['/opt/homebrew/etc/ssh']
          if brew_ssh_arm.stat.exists
          and not (brew_ssh_arm.stat.islnk | default(false)
                   and brew_ssh_arm.stat.lnk_target | default('') == '/etc/ssh')
          else []
        ) + (
          ['/usr/local/etc/ssh']
          if brew_ssh_intel.stat.exists
          and not (brew_ssh_intel.stat.islnk | default(false)
                   and brew_ssh_intel.stat.lnk_target | default('') == '/etc/ssh')
          else []
        )
      }}

- name: Report Homebrew SSH installations found
  debug:
    msg: >-
      Homebrew OpenSSH config dirs found: {{ brew_ssh_dirs | join(', ') if brew_ssh_dirs else 'none' }}

- name: Set UseDNS yes in Homebrew sshd_config
  lineinfile:
    path: "{{ item }}/sshd_config"
    regexp: '^#?\s*UseDNS'
    line: 'UseDNS yes'
    state: present
  loop: "{{ brew_ssh_dirs }}"
  when: brew_ssh_dirs | length > 0
  notify: Reload sshd (macOS)

# -----------------------------------------------------------------------------
# Configure Homebrew OpenSSH ssh_config
# -----------------------------------------------------------------------------
# For each non-symlinked Homebrew SSH config dir, check whether its ssh_config
# includes ssh_config.d and either deploy drop-in files or modify directly.
# Homebrew OpenSSH correctly handles DNSSEC-validated SSHFP records, unlike
# the macOS system OpenSSH which has a bug treating them all as untrusted.

- name: Check whether Homebrew ssh_configs include ssh_config.d
  # Run grep for each Homebrew config dir and store results keyed by dir.
  # We use a shell one-liner to return 0/1 per directory.
  shell: grep -qE '^[[:space:]]*Include.*ssh_config\.d' {{ item }}/ssh_config && echo yes || echo no
  register: brew_ssh_include_check
  changed_when: false
  loop: "{{ brew_ssh_dirs }}"
  when: brew_ssh_dirs | length > 0

- name: Ensure ssh_config.d exists in Homebrew SSH dirs (when included)
  file:
    path: "{{ item.item }}/ssh_config.d"
    state: directory
    owner: root
    mode: "0755"
  loop: "{{ brew_ssh_include_check.results | default([]) }}"
  when: brew_ssh_dirs | length > 0 and item.stdout == 'yes'

- name: Deploy 10-dns-verify.conf to Homebrew ssh_config.d (when included)
  copy:
    src: "{{ playbook_dir }}/roles/ipv6_dns_sync/files/ssh_config.d/10-dns-verify.conf"
    dest: "{{ item.item }}/ssh_config.d/10-dns-verify.conf"
    owner: root
    mode: "0644"
  loop: "{{ brew_ssh_include_check.results | default([]) }}"
  when: brew_ssh_dirs | length > 0 and item.stdout == 'yes'

- name: Deploy 90-owned-domains.conf to Homebrew ssh_config.d (when included)
  copy:
    src: "{{ playbook_dir }}/roles/ipv6_dns_sync/files/ssh_config.d/90-owned-domains.conf"
    dest: "{{ item.item }}/ssh_config.d/90-owned-domains.conf"
    owner: root
    mode: "0644"
    force: false
  loop: "{{ brew_ssh_include_check.results | default([]) }}"
  when: brew_ssh_dirs | length > 0 and item.stdout == 'yes'

- name: Set VerifyHostKeyDNS yes in Homebrew ssh_config (fallback, no include)
  # Only used when the Homebrew ssh_config does not include ssh_config.d.
  lineinfile:
    path: "{{ item.item }}/ssh_config"
    regexp: '^#?\s*VerifyHostKeyDNS'
    line: '    VerifyHostKeyDNS yes'
    state: present
  loop: "{{ brew_ssh_include_check.results | default([]) }}"
  when: brew_ssh_dirs | length > 0 and item.stdout == 'no'
