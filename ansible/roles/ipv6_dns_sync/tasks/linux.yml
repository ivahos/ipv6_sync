---
# =============================================================================
# tasks/linux.yml — Linux (Debian/Ubuntu) specific tasks
# =============================================================================
#
# This file is included by main.yml when the target host is Linux.
# It installs dependencies, deploys files, and sets up the systemd service.
# All tasks run as root (inherited from "become: true" in site.yml).

# -----------------------------------------------------------------------------
# Remove the CDROM apt source if present
# -----------------------------------------------------------------------------
# Fresh Debian installs often have a "deb cdrom:..." line in /etc/apt/sources.list
# left over from the installation media. This causes apt to fail when trying
# to update the package cache because the CD/DVD is no longer present.
#
# The lineinfile module finds lines matching a pattern and removes them.
# "regexp" is a regular expression — "^deb cdrom:" matches any line starting
# with "deb cdrom:". "state: absent" means remove it if found.
# If the line isn't there, this task does nothing (idempotent).

- name: Remove cdrom apt source if present
  lineinfile:
    path: /etc/apt/sources.list
    regexp: '^deb cdrom:'
    state: absent

# -----------------------------------------------------------------------------
# Install nsupdate
# -----------------------------------------------------------------------------
# nsupdate is the tool that actually sends DNS update requests to the DNS
# server. It is part of the bind9-dnsutils package on Debian/Ubuntu.
#
# "update_cache: true" runs "apt update" before installing, equivalent to
# running "apt update && apt install bind9-dnsutils" manually.
# "state: present" means install it if not already installed, and do nothing
# if it is already there (idempotent).

- name: Install nsupdate (bind9-dnsutils)
  apt:
    name: bind9-dnsutils
    state: present
    update_cache: true

- name: Install btrfs-progs if root filesystem is btrfs
  # btrfs-progs provides btrfs management tools (check, scrub, balance,
  # filesystem resize etc.). Only installed when the root filesystem is
  # btrfs -- i.e. on Pis that have been migrated to NVMe boot. Safe to
  # run on non-btrfs hosts -- the task simply skips cleanly.
  apt:
    name: btrfs-progs
    state: present
    update_cache: false
  when: ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='fstype') | first == 'btrfs'

# -----------------------------------------------------------------------------
# Create the cache directory
# -----------------------------------------------------------------------------
# The sync script stores two files here:
#   - state.json: the last known set of IPv6 addresses, used to compute what
#     has changed since the last run so we only send necessary DNS updates
#   - cached_config.json: a local copy of the remote JSON config, used as a
#     fallback if the config URL is temporarily unreachable
#
# "state: directory" creates the directory if it doesn't exist.
# mode "0700" means only root can read, write or enter it — this is
# appropriate since the cached config may contain the path to the TSIG key.

- name: Create cache directory
  file:
    path: "{{ ipv6_cache_dir_linux }}"
    state: directory
    owner: root
    mode: "0700"

# -----------------------------------------------------------------------------
# Deploy the TSIG key file
# -----------------------------------------------------------------------------
# The TSIG (Transaction SIGnature) key authenticates our DNS update requests
# to the DNS server, proving we are authorised to make changes.
#
# We use a Jinja2 template (templates/mykey.j2) rather than a static file
# because the key secret is different per deployment and is stored in the
# host_vars file for this host (inventory/host_vars/<hostname>.yml).
# Ansible substitutes the variable values into the template at deploy time.
#
# mode "0600" means only root can read or write this file — anyone else
# would be able to make unauthorised DNS updates if they got the key.

- name: Deploy TSIG key file
  template:
    src: mykey.j2
    dest: "{{ ipv6_keyfile_linux }}"
    owner: root
    mode: "0600"

# -----------------------------------------------------------------------------
# Deploy the watcher script
# -----------------------------------------------------------------------------
# ipv6_dns_watch_linux.sh is a bash script that runs "ip monitor address"
# to watch for IPv6 address changes on the host's network interfaces.
# When a relevant change is detected it calls ipv6_dns_sync.py to update DNS.
# It uses a trailing-edge debounce (10 seconds of quiet after the last event)
# to avoid hammering the DNS server during rapid address changes.

- name: Copy ipv6_dns_watch_linux.sh to /usr/local/bin
  copy:
    src: "{{ playbook_dir }}/../usr/local/bin/ipv6_dns_watch_linux.sh"
    dest: /usr/local/bin/ipv6_dns_watch_linux.sh
    owner: root
    mode: "0755"

# -----------------------------------------------------------------------------
# Deploy the systemd service unit
# -----------------------------------------------------------------------------
# The service unit file tells systemd how to manage the watcher script as a
# long-running background service:
#   - Start it automatically at boot (after the network is online)
#   - Restart it automatically if it crashes
#   - Log its output to /var/log/ipv6_watch.out and .err
#
# "notify: Reload systemd" triggers the handler in handlers/main.yml which
# runs "systemctl daemon-reload" after the file is copied. This is required
# whenever a service unit file is added or changed, so systemd picks up the
# new configuration.

- name: Copy systemd service file
  copy:
    src: "{{ playbook_dir }}/../etc/systemd/system/ipv6-dns-watch.service"
    dest: /etc/systemd/system/ipv6-dns-watch.service
    owner: root
    mode: "0644"
  notify: Reload systemd

# -----------------------------------------------------------------------------
# Enable and start the service
# -----------------------------------------------------------------------------
# Split into two tasks so we can suppress the noisy systemd status dump
# that appears in verbose output when starting a service.
#
# "enabled: true" makes the service start automatically at boot.
# "daemon_reload: true" ensures systemd has reloaded its config first.

- name: Enable ipv6-dns-watch service
  systemd:
    name: ipv6-dns-watch
    enabled: true
    daemon_reload: true

# "no_log: true" suppresses the wall of systemd status fields that Ansible
# returns when starting a service — they are not useful in normal output.
# The task still reports changed/ok/failed correctly in the play recap.

- name: Start ipv6-dns-watch service
  systemd:
    name: ipv6-dns-watch
    state: started
  no_log: true

# -----------------------------------------------------------------------------
# Deploy the shutdown cleanup service
# -----------------------------------------------------------------------------
# A second systemd service that does nothing on start but runs the sync
# script with --shutdown on stop (i.e. when the machine shuts down).
# This removes all AAAA and PTR records for this host from DNS on shutdown,
# preventing stale records from accumulating over time.
#
# Uses a Jinja2 template so the config URL is substituted in from variables.

- name: Deploy shutdown cleanup service
  template:
    src: ipv6-dns-cleanup.service.j2
    dest: /etc/systemd/system/ipv6-dns-cleanup.service
    owner: root
    mode: "0644"
  notify: Reload systemd

- name: Enable shutdown cleanup service
  systemd:
    name: ipv6-dns-cleanup
    enabled: true
    daemon_reload: true

- name: Start shutdown cleanup service
  systemd:
    name: ipv6-dns-cleanup
    state: started
  no_log: true
# -----------------------------------------------------------------------------
# Configure NetworkManager DNS options (NetworkManager hosts only)
# -----------------------------------------------------------------------------
# On hosts where NetworkManager manages DNS, we set edns0 and trust-ad options
# on all active connections. This causes NetworkManager to write:
#   options edns0 trust-ad
# into /etc/resolv.conf, which tells the local resolver to:
#   edns0     -- use EDNS0 extensions (required for DNSSEC and larger responses)
#   trust-ad  -- trust the Authenticated Data (AD) bit from upstream resolvers,
#                allowing applications to see DNSSEC validation results
#
# Detection: we check for "# Generated by NetworkManager" in /etc/resolv.conf
# rather than checking if NetworkManager is installed or active. This is more
# reliable -- it confirms NM is actually managing DNS on this host, which is
# not always the case even if NM is installed (e.g. on servers using systemd-
# resolved or a static resolv.conf instead).
#
# Idempotency: nmcli connection modify simply overwrites the options with the
# specified value each time, so re-running is always safe.
#
# SSH safety: nmcli connection up reloads the connection without dropping the
# session -- confirmed safe to run on a remote host mid-playbook.

- name: Check whether NetworkManager is managing DNS
  # Look for the NetworkManager header in resolv.conf.
  # The shell command exits 0 (true) if found, 1 (false) if not.
  # We use this result to gate all subsequent NM tasks.
  command: grep -q "^# Generated by NetworkManager" /etc/resolv.conf
  register: nm_manages_dns
  changed_when: false
  failed_when: false

- name: Get active NetworkManager connection names
  # nmcli -t (terse) -f NAME (only NAME field) connection show --active
  # prints one connection name per line with no headers or extra formatting.
  # We split the output into a list for use in the loop below.
  command: nmcli -t -f NAME connection show --active
  register: nm_active_connections
  changed_when: false
  when: nm_manages_dns.rc == 0

- name: Set IPv4 DNS options on active NetworkManager connections
  # Apply edns0 and trust-ad to the IPv4 DNS config for each active connection.
  # nmcli connection modify overwrites the entire dns-options field, so we
  # always specify both options together.
  command: nmcli connection modify "{{ item }}" ipv4.dns-options "trust-ad edns0"
  loop: "{{ nm_active_connections.stdout_lines }}"
  when: nm_manages_dns.rc == 0
  register: nm_ipv4_result

- name: Set IPv6 DNS options on active NetworkManager connections
  # Same as above but for IPv6. Both must be set for the options to appear
  # in resolv.conf regardless of which protocol the connection uses.
  command: nmcli connection modify "{{ item }}" ipv6.dns-options "trust-ad edns0"
  loop: "{{ nm_active_connections.stdout_lines }}"
  when: nm_manages_dns.rc == 0
  register: nm_ipv6_result

- name: Reload active NetworkManager connections to apply DNS options
  # nmcli connection up re-applies the connection profile, causing NetworkManager
  # to regenerate /etc/resolv.conf with the new options. The network may drop
  # very briefly during reload -- the SSH session survives but Ansible may
  # need to retry the connection. ansible.cfg sets a sufficient retry count.
  command: nmcli connection up "{{ item }}"
  loop: "{{ nm_active_connections.stdout_lines }}"
  when: nm_manages_dns.rc == 0

- name: Wait for network to stabilise after connection reload
  # Give NetworkManager a moment to finish regenerating resolv.conf and
  # re-establishing the connection before Ansible sends the next task.
  pause:
    seconds: 3
  when: nm_manages_dns.rc == 0 and nm_active_connections.stdout_lines | length > 0

# -----------------------------------------------------------------------------
# Configure sshd UseDNS
# -----------------------------------------------------------------------------
# UseDNS yes makes sshd perform a reverse DNS lookup on connecting clients
# to verify their hostname matches their IP. With ipv6_dns_sync keeping PTR
# records current for all addresses on all interfaces, reverse lookups always
# resolve correctly so there is no login delay.
#
# We use lineinfile to either replace an existing UseDNS line (commented or
# not) or add it at the end of the file if not present. The sshd service is
# notified to reload so the change takes effect immediately without dropping
# existing sessions (reload re-reads the config without killing connections).

- name: Set UseDNS yes in sshd_config
  # UseDNS yes makes sshd perform a reverse DNS lookup on connecting clients
  # to verify their hostname matches their IP. With ipv6_dns_sync keeping PTR
  # records current, this always resolves correctly with no login delay.
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*UseDNS'
    line: 'UseDNS yes'
    state: present
  notify: Reload sshd

# -----------------------------------------------------------------------------
# Configure SSH client VerifyHostKeyDNS
# -----------------------------------------------------------------------------
# We check whether /etc/ssh/ssh_config already has an Include directive that
# pulls in /etc/ssh/ssh_config.d/*.conf (standard on OpenSSH 8.2+ systems).
#
# If the Include is present:
#   Deploy drop-in files to /etc/ssh/ssh_config.d/ -- the cleanest approach.
#   /etc/ssh/ssh_config itself is left completely untouched.
#
# If the Include is absent (older system or custom config):
#   Fall back to setting VerifyHostKeyDNS yes directly in /etc/ssh/ssh_config.

- name: Check whether ssh_config includes ssh_config.d
  # grep exits 0 if the Include line is found, 1 if not.
  # We look for any Include line referencing ssh_config.d to handle
  # variations in the exact path (e.g. /etc/ssh/ssh_config.d/*.conf
  # vs ssh_config.d/*.conf relative path).
  command: grep -qE '^\s*Include.*ssh_config\.d' /etc/ssh/ssh_config
  register: ssh_config_has_include
  changed_when: false
  failed_when: false

- name: Report ssh_config.d include status
  debug:
    msg: >-
      /etc/ssh/ssh_config {% if ssh_config_has_include.rc == 0 %}
      includes ssh_config.d -- deploying drop-in files.
      {% else %}
      does NOT include ssh_config.d -- setting VerifyHostKeyDNS in ssh_config directly.
      {% endif %}

# --- Path A: ssh_config.d is included -- deploy drop-in files --------------

- name: Ensure /etc/ssh/ssh_config.d exists
  file:
    path: /etc/ssh/ssh_config.d
    state: directory
    owner: root
    mode: "0755"
  when: ssh_config_has_include.rc == 0

- name: Deploy 10-dns-verify.conf to ssh_config.d
  copy:
    src: "{{ playbook_dir }}/roles/ipv6_dns_sync/files/ssh_config.d/10-dns-verify.conf"
    dest: /etc/ssh/ssh_config.d/10-dns-verify.conf
    owner: root
    mode: "0644"
  when: ssh_config_has_include.rc == 0

- name: Deploy 90-owned-domains.conf to ssh_config.d
  # Ships with the Host block commented out -- edit on the host to enable
  # strict SSHFP verification for your own domains. force: false means
  # re-running the playbook never overwrites your customised version.
  copy:
    src: "{{ playbook_dir }}/roles/ipv6_dns_sync/files/ssh_config.d/90-owned-domains.conf"
    dest: /etc/ssh/ssh_config.d/90-owned-domains.conf
    owner: root
    mode: "0644"
    force: false
  when: ssh_config_has_include.rc == 0

# --- Path B: no ssh_config.d include -- modify ssh_config directly ----------

- name: Set VerifyHostKeyDNS yes in ssh_config (fallback)
  # Only used when ssh_config does not include ssh_config.d.
  # Modifies the file in-place using lineinfile, replacing any existing
  # VerifyHostKeyDNS line (commented or not) or appending if absent.
  lineinfile:
    path: /etc/ssh/ssh_config
    regexp: '^#?\s*VerifyHostKeyDNS'
    line: '    VerifyHostKeyDNS yes'
    state: present
  when: ssh_config_has_include.rc != 0
