# roles/ipv6_dns_sync/defaults/main.yml
#
# Default variables for the ipv6_dns_sync role.
# Override these in your inventory (host_vars / group_vars) or on the
# command line with -e, rather than editing this file directly.

# --- Shared ---

# URL where the sync script downloads its JSON config
ipv6_sync_config_url: "https://a02.au/ipv6_sync_config/config.json"

# The actual TSIG key secret. Override this per-host in host_vars
# using an Ansible Vault-encrypted value.
# Example host_vars/myhost.yml:
#   ipv6_tsig_key: !vault |
#     $ANSIBLE_VAULT;1.1;AES256
#     ...
ipv6_tsig_key: "****TSIG_KEY****"

# TSIG key name (the name inside the key { } block in .mykey)
ipv6_tsig_key_name: "ivarkey"

# TSIG key algorithm
ipv6_tsig_key_algorithm: "hmac-sha256"


# --- Linux ---

# Where the TSIG key file is placed on Linux (root home)
ipv6_keyfile_linux: "/root/.mykey"

# Cache directory for state and cached config
ipv6_cache_dir_linux: "/root/.cache/ipv6_dns_sync"


# --- macOS ---

# Where the TSIG key file is placed on macOS (root home is /var/root)
ipv6_keyfile_macos: "/var/root/.mykey"

# Cache directory on macOS
ipv6_cache_dir_macos: "/var/root/.cache/ipv6_dns_sync"

# Path for the Python venv used by the macOS watcher
ipv6_venv_path: "/opt/ipv6-dns-sync/venv"

# Homebrew Python to use when creating the venv.
# On Apple Silicon Macs, Homebrew lives at /opt/homebrew.
# On Intel Macs, it lives at /usr/local.
# If you have a mix, override this per-host in host_vars.
ipv6_homebrew_python: "/opt/homebrew/bin/python3"
