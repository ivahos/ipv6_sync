# /etc/modprobe.d/realtek-usb.conf
#
# Prevent the generic CDC drivers from claiming the Realtek r8152/r8157
# USB network adapter before the native r8152 driver can load.
#
# Without these lines the kernel loads cdc_ncm or cdc_ether at boot,
# which recognises the device as a generic USB network adapter but cannot
# negotiate the correct link speed or advertise 2.5G capability.

# Prevent generic drivers from claiming the device
blacklist cdc_ncm
blacklist cdc_ether

# Force r8152 to load first if the generic drivers are present
softdep cdc_ncm pre: r8152
softdep cdc_ether pre: r8152
