---
# =============================================================================
# roles/raspberry_pi/tasks/main.yml — Raspberry Pi NVMe boot preparation
# =============================================================================
#
# This role handles two distinct situations depending on how the Pi is booted:
#
#   Booted from SD card (root on mmcblkX):
#     Full NVMe preparation sequence runs -- converts the NVMe root partition
#     from ext4 to btrfs, updates boot config, installs ipv6_dns_sync into
#     the chroot, and leaves the machine ready to shut down and boot from NVMe.
#
#   Booted from NVMe (root NOT on mmcblkX):
#     The Pi is already running from its NVMe drive. In this case the role
#     skips all NVMe preparation and falls through to linux.yml, performing
#     a normal ipv6_dns_sync installation on the live running system.
#
# It is safe to run repeatedly -- every destructive step is guarded by a
# condition that checks whether the work is already done.
#
# CLONED DEVICE HANDLING:
#   When the NVMe is a block-level clone of the SD card both devices will
#   share identical UUIDs (p1 boot UUID and p2 root UUID are the same on
#   both disks). This is the normal outcome of tools like rpi-clone.
#   The playbook handles this safely:
#     - blkid -p is used to read UUIDs directly from each device rather
#       than from the kernel's cached blkid database, avoiding ambiguity.
#     - After btrfs-convert the NVMe root gets a new unique btrfs UUID.
#     - The NVMe boot partition UUID is read and written into the NVMe
#       fstab explicitly, so the NVMe fstab is self-consistent even though
#       the boot partition UUID is still shared with the SD card.
#     - cmdline.txt on the NVMe boot partition is updated to point to the
#       new btrfs UUID, so the kernel finds the right root on next boot.
#
# FULL SEQUENCE:
#   Phase 1 -- Detection
#     1a. Detect whether root filesystem is on an SD card (mmcblkX device)
#     1b. If NOT booted from SD: run linux.yml directly and stop here
#     1c. Confirm /dev/nvme0n1 exists
#
#   Phase 2 -- NVMe filesystem preparation (skipped if already btrfs)
#     2a. Install btrfs-progs
#     2b. Check filesystem type on nvme_root_partition
#     2c. Grow the root partition to fill the device  (parted + resize2fs)
#     2d. Run e2fsck -fy to ensure ext4 is clean before conversion
#     2e. Convert ext4 -> btrfs                       (btrfs-convert)
#     2f. Verify the resulting btrfs is healthy        (btrfs check --readonly)
#
#   Phase 3 -- Mount NVMe under /mnt
#     3a. Mount nvme_root_partition (btrfs) on /mnt
#     3b. Mount nvme_boot_partition (FAT32) on /mnt/boot/firmware
#     3c. Bind-mount /proc /sys /dev /dev/pts into the chroot tree
#
#   Phase 4 -- Update boot configuration inside the chroot
#     4a. Read btrfs UUID of nvme_root_partition  (blkid -p, bypasses cache)
#     4b. Read FAT32 UUID of nvme_boot_partition  (blkid -p, bypasses cache)
#     4c. Patch root= and rootfstype= in /mnt/boot/firmware/cmdline.txt
#     4d. Rewrite /mnt/etc/fstab with correct UUIDs for both partitions
#     4e. Copy /etc/resolv.conf so apt works inside the chroot
#     4f. Run update-initramfs -u -k all inside chroot
#
#   Phase 5 -- Install ipv6_dns_sync inside the chroot
#     5a. Install bind9-dnsutils via apt inside chroot
#     5b. Create cache directory
#     5c. Deploy TSIG key file
#     5d. Copy ipv6_dns_sync.py and ipv6_dns_watch_linux.sh
#     5e. Copy systemd unit files
#     5f. Enable both services via systemctl inside chroot
#         (services are NOT started -- the chroot has no running init)
#
#   Phase 6 -- Clean up
#     6a. Unmount bind mounts (/dev/pts, /dev, /sys, /proc)
#     6b. Unmount /mnt/boot/firmware
#     6c. Unmount /mnt
#     6d. Print ready-to-shutdown message
#
# OVERRIDE VARIABLES (set in inventory/host_vars/<hostname>.yml):
#   nvme_device:         block device          (default: /dev/nvme0n1)
#   nvme_boot_partition: FAT32 boot partition  (default: /dev/nvme0n1p1)
#   nvme_root_partition: ext4/btrfs root part  (default: /dev/nvme0n1p2)
#   nvme_chroot:         chroot mount point    (default: /mnt)


# =============================================================================
# PHASE 1 -- Detection
# =============================================================================

- name: Get root filesystem device
  # Read /proc/mounts, find the root mount point, return its device.
  # On an SD-booted Pi this will be something like /dev/mmcblk0p2.
  # On a Pi already running from NVMe it will be something like /dev/nvme0n1p2.
  shell: awk '$2 == "/" {print $1}' /proc/mounts
  register: root_device_raw
  changed_when: false

- name: Determine whether booted from SD card
  set_fact:
    booted_from_sd: "{{ root_device_raw.stdout
                        | regex_replace('^/dev/', '')
                        | regex_search('^mmcblk') is not none }}"

- name: Report boot device
  debug:
    msg: >-
      Root device: {{ root_device_raw.stdout }}
      -- booted from SD: {{ booted_from_sd }}
      {% if not booted_from_sd %}
      Pi is already running from NVMe -- falling through to normal Linux install.
      {% endif %}

- name: Run normal Linux install if not booted from SD card
  # The Pi is already running from its NVMe drive (or some other non-SD device).
  # There is nothing to convert or migrate -- treat it as a normal Linux host
  # and install ipv6_dns_sync directly onto the live running system, exactly
  # as linux.yml would for any other Debian/Ubuntu machine.
  include_tasks: linux.yml
  when: not booted_from_sd

- name: Check whether NVMe device exists
  stat:
    path: "{{ nvme_device }}"
  register: nvme_stat
  when: booted_from_sd

- name: Report NVMe detection result
  debug:
    msg: >-
      {{ nvme_device }}:
      {% if nvme_stat.stat.exists %}found{% else %}NOT found -- all NVMe tasks will be skipped{% endif %}
  when: booted_from_sd

# Convenience fact used in every subsequent when: clause to keep them short.
# Only set when booted from SD -- if we fell through to linux.yml above,
# none of the phases below are reached.
- name: Set nvme_ready fact
  set_fact:
    nvme_ready: "{{ booted_from_sd and nvme_stat.stat.exists }}"
  when: booted_from_sd


# =============================================================================
# PHASE 2 -- NVMe filesystem preparation
# =============================================================================

- name: Install btrfs-progs
  # Provides btrfs-convert, btrfs check, mkfs.btrfs.
  # update_cache: false because linux.yml already ran apt-get update.
  apt:
    name: btrfs-progs
    state: present
    update_cache: false
  when: nvme_ready

- name: Check whether NVMe root partition exists
  stat:
    path: "{{ nvme_root_partition }}"
  register: nvme_root_stat
  when: nvme_ready

- name: Detect filesystem type on NVMe root partition
  # blkid -p (low-level probe) reads directly from the device rather than
  # from the kernel's cached blkid database. This is essential here because
  # the NVMe is a clone of the SD card and both partitions share the same
  # UUIDs -- the kernel cache may return results for the wrong device.
  # -o value -s TYPE prints just the filesystem type string: "ext4" or "btrfs".
  # failed_when: false because blkid exits non-zero on an unformatted device.
  command: blkid -p -o value -s TYPE {{ nvme_root_partition }}
  register: nvme_fs_type
  changed_when: false
  failed_when: false
  when: nvme_ready and nvme_root_stat.stat.exists

- name: Report current NVMe root partition filesystem
  debug:
    msg: "{{ nvme_root_partition }} filesystem: {{ nvme_fs_type.stdout | default('unknown') }}"
  when: nvme_ready and nvme_root_stat.stat.exists

# ---- Grow partition to fill device (ext4 only -- skipped if already btrfs) -

- name: Get NVMe device size in bytes
  command: blockdev --getsize64 {{ nvme_device }}
  register: nvme_size_bytes
  changed_when: false
  when: nvme_ready and nvme_root_stat.stat.exists and nvme_fs_type.stdout | default('') == 'ext4'

- name: Get current root partition end in bytes
  # parted machine-readable output for partition 2 looks like:
  #   2:538968064B:62537072639B:61998104576B:ext4::;
  # Field 3 is the end byte. We strip the trailing B.
  shell: |
    parted -m {{ nvme_device }} unit B print 2>/dev/null \
      | awk -F: '$1 == "2" { gsub(/B/, "", $3); print $3 }'
  register: nvme_part_end_bytes
  changed_when: false
  when: nvme_ready and nvme_root_stat.stat.exists and nvme_fs_type.stdout | default('') == 'ext4'

- name: Grow NVMe root partition to fill device
  # Only runs when partition end is more than 1 MiB short of device end.
  # The 1 MiB tolerance handles alignment rounding and prevents a spurious
  # changed on a device that is already fully partitioned.
  command: parted -s {{ nvme_device }} resizepart 2 100%
  when: >
    nvme_ready and
    nvme_root_stat.stat.exists and
    nvme_fs_type.stdout | default('') == 'ext4' and
    (nvme_size_bytes.stdout | int) - (nvme_part_end_bytes.stdout | int) > 1048576

- name: Grow ext4 filesystem to fill enlarged partition
  # resize2fs with no size argument means "fill the block device".
  # -f forces the operation even if e2fsck has not been run recently.
  # Safe to run a second time -- exits 0 with "nothing to do".
  command: resize2fs -f {{ nvme_root_partition }}
  when: >
    nvme_ready and
    nvme_root_stat.stat.exists and
    nvme_fs_type.stdout | default('') == 'ext4'

# ---- Check ext4 filesystem before conversion --------------------------------

- name: Run e2fsck to ensure ext4 is clean before conversion
  # Disabled by default (nvme_run_e2fsck: false) because a cleanly cloned
  # filesystem does not need it -- the clone tool unmounts the source before
  # copying so the journal is clean. Set nvme_run_e2fsck: true in host_vars
  # if you have reason to believe the filesystem may be dirty (e.g. the clone
  # was made from a live mounted source, or a previous run was interrupted).
  #
  # When enabled:
  #   -f = force check even if the filesystem appears clean
  #   -y = answer yes to all repair prompts (non-interactive)
  #   rc=0: clean, rc=1: errors found and fixed (both are success)
  #   rc>=2: unrecoverable errors (aborts the playbook)
  command: e2fsck -fy {{ nvme_root_partition }}
  register: e2fsck_result
  failed_when: e2fsck_result.rc > 1
  changed_when: e2fsck_result.rc == 1
  when: >
    nvme_ready and
    nvme_run_e2fsck and
    nvme_root_stat.stat.exists and
    nvme_fs_type.stdout | default('') == 'ext4'

# ---- Convert ext4 -> btrfs --------------------------------------------------

- name: Convert ext4 filesystem to btrfs
  # btrfs-convert is an in-place conversion. It writes btrfs metadata into
  # the free space of the ext4 filesystem and atomically switches the
  # superblock. The original ext4 data is preserved in a read-only subvolume
  # named "ext2_saved" which can be used with btrfs-convert --rollback if
  # you need to undo the conversion.
  #
  # After conversion the partition gets a new btrfs UUID, breaking the
  # UUID collision with the SD card's root partition. The boot partition
  # UUID (FAT32, p1) remains shared but this does not affect booting since
  # the kernel identifies the root by its UUID in cmdline.txt, not p1.
  #
  # This is the most time-consuming step -- allow 5-15 minutes on a large
  # drive. The filesystem MUST be unmounted, which is guaranteed by the SD
  # boot precondition checked in Phase 1.
  #
  # The when: condition makes this idempotent: skipped entirely if the
  # partition is already btrfs (e.g. from a previous run of this playbook).
  command: btrfs-convert {{ nvme_root_partition }}
  when: >
    nvme_ready and
    nvme_root_stat.stat.exists and
    nvme_fs_type.stdout | default('') == 'ext4'
  async: "{{ nvme_convert_timeout }}"
  poll: 15      # check every 15 seconds so we see progress in the log

- name: Verify btrfs filesystem after conversion
  # Disabled by default (nvme_run_btrfs_check: false) because on a 4TB drive
  # btrfs check --readonly can take 20-30+ minutes walking the entire tree,
  # making the playbook appear hung. Enable in host_vars if you want the
  # extra confidence of a full structural check after conversion.
  command: btrfs check --readonly {{ nvme_root_partition }}
  changed_when: false
  when: nvme_ready and nvme_run_btrfs_check and nvme_root_stat.stat.exists


# =============================================================================
# PHASE 3 -- Mount NVMe under /mnt
# =============================================================================
#
# We mount the NVMe partitions into a tree rooted at nvme_chroot (/mnt by
# default), then bind-mount the kernel pseudo-filesystems into it so that
# tools running inside the chroot (apt, update-initramfs, systemctl) work
# correctly.

- name: Ensure chroot mount point exists
  file:
    path: "{{ nvme_chroot }}"
    state: directory
    mode: "0755"
  when: nvme_ready

- name: Mount NVMe root partition (btrfs) on {{ nvme_chroot }}
  mount:
    path: "{{ nvme_chroot }}"
    src: "{{ nvme_root_partition }}"
    fstype: btrfs
    state: mounted
  when: nvme_ready

- name: Ensure {{ nvme_chroot }}/boot/firmware mount point exists
  file:
    path: "{{ nvme_chroot }}/boot/firmware"
    state: directory
    mode: "0755"
  when: nvme_ready

- name: Mount NVMe boot partition (FAT32) on {{ nvme_chroot }}/boot/firmware
  mount:
    path: "{{ nvme_chroot }}/boot/firmware"
    src: "{{ nvme_boot_partition }}"
    fstype: vfat
    state: mounted
  when: nvme_ready

- name: Bind-mount /proc into chroot
  # Needed by update-initramfs, systemctl, and many package scripts.
  mount:
    path: "{{ nvme_chroot }}/proc"
    src: /proc
    fstype: none
    opts: bind
    state: mounted
  when: nvme_ready

- name: Bind-mount /sys into chroot
  # Needed by udev rules during initramfs generation.
  mount:
    path: "{{ nvme_chroot }}/sys"
    src: /sys
    fstype: none
    opts: bind
    state: mounted
  when: nvme_ready

- name: Bind-mount /dev into chroot
  # Needed so device nodes are visible inside the chroot.
  mount:
    path: "{{ nvme_chroot }}/dev"
    src: /dev
    fstype: none
    opts: bind
    state: mounted
  when: nvme_ready

- name: Bind-mount /dev/pts into chroot
  # Needed by apt and any tool that opens a pseudo-terminal.
  mount:
    path: "{{ nvme_chroot }}/dev/pts"
    src: /dev/pts
    fstype: none
    opts: bind
    state: mounted
  when: nvme_ready


# =============================================================================
# PHASE 4 -- Update boot configuration inside the chroot
# =============================================================================

- name: Get btrfs UUID of NVMe root partition
  # blkid -p (low-level probe) reads directly from the device, bypassing the
  # kernel UUID cache. This is critical here: before conversion both the SD
  # and NVMe root partitions had the same UUID, so the cache could return
  # the SD card's entry instead of the NVMe's. After btrfs-convert the NVMe
  # root has a new unique UUID -- -p ensures we read that new value.
  command: blkid -p -o value -s UUID {{ nvme_root_partition }}
  register: nvme_root_uuid
  changed_when: false
  when: nvme_ready

- name: Get FAT32 UUID of NVMe boot partition
  # We also read the boot partition UUID directly from the device.
  # Even though the NVMe boot partition currently shares its UUID with the
  # SD boot partition (both are clones), we write this UUID explicitly into
  # the NVMe fstab so it is self-consistent. The FAT32 UUID will remain
  # shared with the SD card's boot partition, which is harmless -- the
  # kernel uses the root UUID from cmdline.txt to find the root filesystem,
  # and the boot partition is identified by its mountpoint in fstab after
  # root is mounted.
  command: blkid -p -o value -s UUID {{ nvme_boot_partition }}
  register: nvme_boot_uuid
  changed_when: false
  when: nvme_ready

- name: Report UUIDs
  debug:
    msg:
      - "NVMe boot partition ({{ nvme_boot_partition }}) UUID: {{ nvme_boot_uuid.stdout }}"
      - "NVMe root partition ({{ nvme_root_partition }}) UUID: {{ nvme_root_uuid.stdout }}"
  when: nvme_ready

- name: Update root= parameter in cmdline.txt
  # cmdline.txt is a single line of kernel parameters. The root= parameter
  # tells the kernel which device to mount as the root filesystem.
  # We replace whatever root=PARTUUID=... or root=UUID=... or root=/dev/...
  # is currently there with the new btrfs UUID.
  replace:
    path: "{{ nvme_chroot }}/boot/firmware/cmdline.txt"
    regexp: 'root=\S+'
    replace: "root=UUID={{ nvme_root_uuid.stdout }}"
  when: nvme_ready

- name: Update rootfstype= in cmdline.txt
  # Change rootfstype=ext4 to rootfstype=btrfs.
  # If the parameter is absent this task does nothing (idempotent).
  replace:
    path: "{{ nvme_chroot }}/boot/firmware/cmdline.txt"
    regexp: 'rootfstype=\S+'
    replace: "rootfstype=btrfs"
  when: nvme_ready

- name: Rewrite fstab with correct UUIDs for both NVMe partitions
  # We rewrite the two device lines in fstab rather than doing a simple
  # regexp replace. This is safer on a cloned fstab because:
  #   - The root line still has the old shared UUID (same as SD card)
  #   - The boot line also has the old shared UUID
  # A simple UUID substitution would match both lines with the same value
  # and could corrupt the result. Instead we use blockinfile to replace
  # both lines atomically with correct, explicit values.
  #
  # We preserve all other fstab lines (tmpfs, swap, etc.) by reading the
  # current fstab, stripping the two partition lines, and prepending the
  # corrected entries.
  shell: |
    FSTAB="{{ nvme_chroot }}/etc/fstab"
    # Strip any existing lines that mount / or /boot/firmware from a block device
    OTHER=$(grep -v -E '^\s*(UUID=|PARTUUID=|LABEL=|/dev/)[^ ].*\s+(/|/boot/firmware)\s' "$FSTAB" || true)
    cat > "$FSTAB" << EOF
    # Generated by ipv6_sync ansible role (raspberry_pi)
    UUID={{ nvme_boot_uuid.stdout }}  /boot/firmware  vfat  defaults  0  2
    UUID={{ nvme_root_uuid.stdout }}  /               btrfs defaults  0  1
    $OTHER
    EOF
  args:
    executable: /bin/bash
  when: nvme_ready

- name: Copy resolv.conf into chroot so apt can resolve hostnames
  # Without a working resolv.conf, apt cannot reach the Debian/Raspberry Pi
  # OS package mirrors. We copy the SD card's resolv.conf which is already
  # working (we are online via the SD boot).
  copy:
    src: /etc/resolv.conf
    dest: "{{ nvme_chroot }}/etc/resolv.conf"
    remote_src: true   # both src and dest are on the remote Pi, not the controller
  when: nvme_ready

- name: Regenerate initramfs inside chroot
  # update-initramfs rebuilds the initial RAM filesystem that the bootloader
  # loads before the kernel mounts the root partition. It must be regenerated
  # because the root device has changed (new UUID, filesystem type now btrfs).
  # -u = update existing initramfs for all installed kernels
  # -k all = rebuild for every kernel version present
  # Run via chroot so it uses the NVMe root's kernel version and hooks.
  command: chroot {{ nvme_chroot }} update-initramfs -u -k all
  when: nvme_ready


# =============================================================================
# PHASE 5 -- Install ipv6_dns_sync inside the chroot
# =============================================================================
#
# This mirrors exactly what linux.yml does on a normal Linux host, but every
# file operation targets {{ nvme_chroot }}/... and every command runs via
# chroot. The result is that the NVMe root will have ipv6_dns_sync fully
# installed and enabled before its first native boot.

- name: Install bind9-dnsutils inside chroot
  # nsupdate (from bind9-dnsutils) is required by ipv6_dns_sync.py.
  # We run apt-get inside the chroot so the package is installed into the
  # NVMe root's dpkg database, not the SD card's.
  command: chroot {{ nvme_chroot }} apt-get install -y bind9-dnsutils
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: nvme_ready

- name: Create ipv6_dns_sync cache directory inside chroot
  file:
    path: "{{ nvme_chroot }}{{ ipv6_cache_dir_linux }}"
    state: directory
    owner: root
    mode: "0700"
  when: nvme_ready

- name: Deploy TSIG key file into chroot
  template:
    src: mykey.j2
    dest: "{{ nvme_chroot }}{{ ipv6_keyfile_linux }}"
    owner: root
    mode: "0600"
  when: nvme_ready

- name: Copy ipv6_dns_sync.py into chroot
  copy:
    src: "{{ playbook_dir }}/../usr/local/bin/ipv6_dns_sync.py"
    dest: "{{ nvme_chroot }}/usr/local/bin/ipv6_dns_sync.py"
    owner: root
    mode: "0755"
  when: nvme_ready

- name: Copy ipv6_dns_watch_linux.sh into chroot
  copy:
    src: "{{ playbook_dir }}/../usr/local/bin/ipv6_dns_watch_linux.sh"
    dest: "{{ nvme_chroot }}/usr/local/bin/ipv6_dns_watch_linux.sh"
    owner: root
    mode: "0755"
  when: nvme_ready

- name: Copy ipv6-dns-watch.service into chroot
  copy:
    src: "{{ playbook_dir }}/../etc/systemd/system/ipv6-dns-watch.service"
    dest: "{{ nvme_chroot }}/etc/systemd/system/ipv6-dns-watch.service"
    owner: root
    mode: "0644"
  when: nvme_ready

- name: Deploy ipv6-dns-cleanup.service into chroot
  # Uses the Jinja2 template so the config URL variable is substituted in,
  # exactly as linux.yml does for a live host.
  template:
    src: ipv6-dns-cleanup.service.j2
    dest: "{{ nvme_chroot }}/etc/systemd/system/ipv6-dns-cleanup.service"
    owner: root
    mode: "0644"
  when: nvme_ready

- name: Enable ipv6-dns-watch service inside chroot
  # systemctl enable creates the symlink in the systemd wants/ directory so
  # the service starts automatically on the first native NVMe boot.
  # We cannot use the Ansible systemd module here because there is no running
  # systemd inside the chroot -- we call systemctl directly via chroot.
  command: chroot {{ nvme_chroot }} systemctl enable ipv6-dns-watch.service
  when: nvme_ready

- name: Enable ipv6-dns-cleanup service inside chroot
  command: chroot {{ nvme_chroot }} systemctl enable ipv6-dns-cleanup.service
  when: nvme_ready


# =============================================================================
# PHASE 6 -- Unmount and finish
# =============================================================================
#
# Unmount in strict reverse order: deepest mounts first, root last.
# state: unmounted calls umount and removes any entry the mount module
# added to the host's /etc/fstab during Phase 3.

- name: Unmount /dev/pts from chroot
  mount:
    path: "{{ nvme_chroot }}/dev/pts"
    state: unmounted
  when: nvme_ready

- name: Unmount /dev from chroot
  mount:
    path: "{{ nvme_chroot }}/dev"
    state: unmounted
  when: nvme_ready

- name: Unmount /sys from chroot
  mount:
    path: "{{ nvme_chroot }}/sys"
    state: unmounted
  when: nvme_ready

- name: Unmount /proc from chroot
  mount:
    path: "{{ nvme_chroot }}/proc"
    state: unmounted
  when: nvme_ready

- name: Unmount NVMe boot partition
  mount:
    path: "{{ nvme_chroot }}/boot/firmware"
    state: unmounted
  when: nvme_ready

- name: Unmount NVMe root partition
  mount:
    path: "{{ nvme_chroot }}"
    state: unmounted
  when: nvme_ready

- name: NVMe preparation complete
  debug:
    msg: >-
      NVMe boot preparation is complete. The machine is ready to shut down.
      Remove the SD card before powering back on and the Pi will boot from the NVMe drive.
  when: nvme_ready
