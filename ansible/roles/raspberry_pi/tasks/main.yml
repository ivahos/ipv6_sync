---
# =============================================================================
# roles/raspberry_pi/tasks/main.yml — Raspberry Pi NVMe boot preparation
# =============================================================================
#
# This role handles two distinct situations depending on how the Pi is booted:
#
#   Booted from SD card (root on mmcblkX):
#     Full NVMe preparation sequence runs -- converts the NVMe root partition
#     from ext4 to btrfs, converts the partition table from MBR to GPT (which
#     is required to address >2TB on a 4TB drive), grows the partition to fill
#     the disk, and leaves the machine ready to shut down and boot from NVMe.
#
#   Booted from NVMe (root NOT on mmcblkX):
#     The Pi is already running from its NVMe drive. The role skips all NVMe
#     preparation and falls through to linux.yml, performing a normal
#     ipv6_dns_sync installation on the live running system.
#
# It is safe to run repeatedly -- every destructive step is guarded by a
# condition that checks whether the work is already done.
#
# CLONED DEVICE HANDLING:
#   When the NVMe is a block-level clone of the SD card both devices share
#   identical UUIDs. blkid -p is used throughout to read UUIDs directly from
#   each device node rather than from the kernel's cached blkid database.
#   After btrfs-convert the NVMe root gets a new unique btrfs UUID, breaking
#   the collision with the SD card.
#
# CORRECT SEQUENCE (confirmed by manual run):
#   1. btrfs-convert          -- converts ext4 to btrfs at current partition size
#   2. gdisk MBR->GPT         -- required before parted can address >2TB
#   3. parted resizepart 100% -- grows partition entry to fill the disk
#   4. mount btrfs
#   5. btrfs filesystem resize max -- grows filesystem to fill enlarged partition
#   6. chroot steps (boot config, initramfs, ipv6_dns_sync install)
#   7. unmount
#
# FULL SEQUENCE:
#   Phase 1 -- Detection
#     1a. Detect whether root filesystem is on an SD card (mmcblkX device)
#     1b. If NOT booted from SD: run linux.yml directly and stop here
#     1c. Confirm /dev/nvme0n1 exists
#
#   Phase 2 -- NVMe filesystem preparation (skipped if already btrfs)
#     2a. Install btrfs-progs and gdisk
#     2b. Detect filesystem type on nvme_root_partition
#     2c. Optionally run e2fsck -fy (disabled by default, see nvme_run_e2fsck)
#     2d. Convert ext4 -> btrfs   (btrfs-convert)
#     2e. Convert MBR -> GPT      (gdisk, required for >2TB)
#     2f. Grow partition to 100%  (parted resizepart)
#
#   Phase 3 -- Mount NVMe under /mnt
#     3a. Mount nvme_root_partition (btrfs) on /mnt
#     3b. Grow btrfs to fill enlarged partition (btrfs filesystem resize max)
#     3c. Mount nvme_boot_partition (FAT32) on /mnt/boot/firmware
#     3d. Bind-mount /proc /sys /dev /dev/pts into the chroot tree
#
#   Phase 4 -- Update boot configuration inside the chroot
#     4a. Read btrfs UUID of nvme_root_partition  (blkid -p, bypasses cache)
#     4b. Read FAT32 UUID of nvme_boot_partition  (blkid -p, bypasses cache)
#     4c. Patch root= and rootfstype= in /mnt/boot/firmware/cmdline.txt
#     4d. Rewrite /mnt/etc/fstab with correct UUIDs for both partitions
#     4e. Copy /etc/resolv.conf so apt works inside the chroot
#     4f. Run update-initramfs -u -k all inside chroot
#
#   Phase 5 -- Install ipv6_dns_sync inside the chroot
#     5a. Install bind9-dnsutils via apt inside chroot
#     5b. Create cache directory
#     5c. Deploy TSIG key file
#     5d. Copy ipv6_dns_sync.py and ipv6_dns_watch_linux.sh
#     5e. Copy systemd unit files
#     5f. Enable both services via systemctl inside chroot
#         (services are NOT started -- the chroot has no running init)
#
#   Phase 6 -- Clean up
#     6a. Unmount bind mounts (/dev/pts, /dev, /sys, /proc)
#     6b. Unmount /mnt/boot/firmware
#     6c. Unmount /mnt
#     6d. Print ready-to-shutdown message
#
# OVERRIDE VARIABLES (set in inventory/host_vars/<hostname>.yml):
#   nvme_device:          block device          (default: /dev/nvme0n1)
#   nvme_boot_partition:  FAT32 boot partition  (default: /dev/nvme0n1p1)
#   nvme_root_partition:  ext4/btrfs root part  (default: /dev/nvme0n1p2)
#   nvme_chroot:          chroot mount point    (default: /mnt)
#   nvme_run_e2fsck:      run e2fsck before convert (default: false)
#   nvme_run_btrfs_check: run btrfs check after convert (default: false)
#   nvme_convert_timeout: seconds to wait for btrfs-convert (default: 3600)


# =============================================================================
# PHASE 1 -- Detection
# =============================================================================

- name: Get root filesystem device
  # Read /proc/mounts, find the root mount point, return its device.
  # On an SD-booted Pi this will be something like /dev/mmcblk0p2.
  # On a Pi already running from NVMe it will be something like /dev/nvme0n1p2.
  shell: awk '$2 == "/" {print $1}' /proc/mounts
  register: root_device_raw
  changed_when: false

- name: Determine whether booted from SD card
  set_fact:
    booted_from_sd: "{{ root_device_raw.stdout
                        | regex_replace('^/dev/', '')
                        | regex_search('^mmcblk') is not none }}"

- name: Report boot device
  debug:
    msg: >-
      Root device: {{ root_device_raw.stdout }}
      -- booted from SD: {{ booted_from_sd }}
      {% if not booted_from_sd %}
      Pi is already running from NVMe -- falling through to normal Linux install.
      {% endif %}

- name: Run normal Linux install if not booted from SD card
  # The Pi is already running from its NVMe drive. Treat it as a normal Linux
  # host and install ipv6_dns_sync directly onto the live running system.
  # Use role_path to get the absolute path to the tasks directory so this
  # works correctly regardless of where Ansible is invoked from.
  include_tasks: "{{ role_path }}/../ipv6_dns_sync/tasks/linux.yml"
  when: not booted_from_sd

- name: Check whether NVMe device exists
  stat:
    path: "{{ nvme_device }}"
  register: nvme_stat
  when: booted_from_sd

- name: Report NVMe detection result
  debug:
    msg: >-
      {{ nvme_device }}:
      {% if nvme_stat.stat.exists %}found{% else %}NOT found -- all NVMe tasks will be skipped{% endif %}
  when: booted_from_sd

# Convenience fact used in every subsequent when: clause to keep them short.
- name: Set nvme_ready fact
  set_fact:
    nvme_ready: "{{ booted_from_sd and nvme_stat.stat.exists }}"
  when: booted_from_sd


# =============================================================================
# PHASE 2 -- NVMe filesystem preparation
# =============================================================================

- name: Install btrfs-progs and gdisk
  # btrfs-progs: provides btrfs-convert and btrfs filesystem resize.
  # gdisk: needed to convert the MBR partition table to GPT, which is
  # required before parted can grow a partition beyond the 2TB MBR limit.
  # update_cache: true because on the SD boot path linux.yml never runs,
  # so apt-get update has not been called yet and the cache may be stale.
  apt:
    name:
      - btrfs-progs
      - gdisk
    state: present
    update_cache: true
  when: nvme_ready

- name: Check whether NVMe root partition exists
  stat:
    path: "{{ nvme_root_partition }}"
  register: nvme_root_stat
  when: nvme_ready

- name: Detect filesystem type on NVMe root partition
  # blkid -p (low-level probe) reads directly from the device rather than
  # from the kernel's cached blkid database. This is essential when the NVMe
  # is a clone of the SD card and both partitions share the same UUID --
  # the kernel cache may return results for the wrong device.
  command: blkid -p -o value -s TYPE {{ nvme_root_partition }}
  register: nvme_fs_type
  changed_when: false
  failed_when: false
  when: nvme_ready and nvme_root_stat.stat.exists

- name: Report current NVMe root partition filesystem
  debug:
    msg: "{{ nvme_root_partition }} filesystem: {{ nvme_fs_type.stdout | default('unknown') }}"
  when: nvme_ready and nvme_root_stat.stat.exists

# ---- Optional e2fsck -------------------------------------------------------

- name: Run e2fsck to ensure ext4 is clean before conversion
  # Disabled by default (nvme_run_e2fsck: false) because a cleanly cloned
  # filesystem does not need it. Enable in host_vars if the clone was made
  # from a live mounted source or a previous run was interrupted.
  # -f = force check even if filesystem appears clean
  # -y = answer yes to all repair prompts (non-interactive)
  # rc=0: clean, rc=1: errors found and fixed (both treated as success)
  # rc>=2: unrecoverable errors (aborts the playbook)
  command: e2fsck -fy {{ nvme_root_partition }}
  register: e2fsck_result
  failed_when: e2fsck_result.rc > 1
  changed_when: e2fsck_result.rc == 1
  when: >
    nvme_ready and
    nvme_run_e2fsck and
    nvme_root_stat.stat.exists and
    nvme_fs_type.stdout | default('') == 'ext4'

# ---- Convert ext4 -> btrfs -------------------------------------------------

- name: Convert ext4 filesystem to btrfs
  # btrfs-convert performs an in-place conversion at the current partition
  # size. The partition is grown AFTER conversion (see gdisk and parted steps
  # below) because:
  #   - The partition table is MBR which cannot address >2TB
  #   - We must convert to GPT first, then resize
  #   - btrfs filesystem resize max is run after mounting in Phase 3
  #
  # The new btrfs UUID will differ from the old ext4 UUID, breaking the
  # UUID collision with the cloned SD card partition.
  #
  # Skipped if already btrfs (idempotent).
  command: btrfs-convert {{ nvme_root_partition }}
  when: >
    nvme_ready and
    nvme_root_stat.stat.exists and
    nvme_fs_type.stdout | default('') == 'ext4'
  async: "{{ nvme_convert_timeout }}"
  poll: 15

# ---- Convert MBR -> GPT ----------------------------------------------------

- name: Check current partition table type
  # parted machine-readable output line 2 looks like:
  #   /dev/nvme0n1:4097GB:nvme:512:512:msdos:SPCC M.2 PCIe SSD:;
  # Field 6 is the partition table type: "msdos" (MBR) or "gpt".
  # The shell string is quoted to prevent Ansible treating awk's {print $6}
  # as a Jinja2 expression.
  shell: "parted -m {{ nvme_device }} print 2>/dev/null | awk -F: 'NR==2 {print $6}'"
  register: nvme_ptable_type
  changed_when: false
  when: nvme_ready

- name: Convert MBR partition table to GPT
  # parted cannot grow a partition beyond 2TB on an MBR disk. On a 4TB NVMe
  # the MBR limit (4294967295 sectors at 512B = 2TB) prevents resizepart.
  # gdisk converts the existing MBR partition table to GPT in-place,
  # preserving all existing partition entries and their data.
  #
  # We drive gdisk non-interactively: "w\ny\n" writes the GPT and confirms.
  # This is idempotent: if the table is already GPT, gdisk opens it as GPT
  # and writing it again is a no-op.
  shell: printf 'w\ny\n' | gdisk {{ nvme_device }}
  when: nvme_ready and nvme_ptable_type.stdout == 'msdos'

# ---- Grow partition to fill device -----------------------------------------

- name: Grow NVMe root partition to fill device
  # Now that the partition table is GPT, parted can address the full 4TB.
  # resizepart 2 100% moves the partition 2 end sector to the last usable
  # sector on the disk. The btrfs filesystem still occupies the old smaller
  # size at this point -- it is grown after mounting in Phase 3.
  #
  # On a re-run the btrfs partition may already be mounted (from a previous
  # partial run). Parted detects this and prints a warning asking for
  # confirmation before proceeding. We use parted's -s (script) flag plus
  # ignore_errors so the warning does not abort the playbook -- the actual
  # resize still succeeds. resizepart only moves the partition table entry
  # so it is safe to run with the filesystem mounted.
  shell: parted -s {{ nvme_device }} resizepart 2 100% || true
  when: nvme_ready

# ---- Optional btrfs check --------------------------------------------------

- name: Verify btrfs filesystem
  # Disabled by default (nvme_run_btrfs_check: false) because on a 4TB drive
  # btrfs check --readonly walks the entire filesystem tree and can take
  # 20-30+ minutes, making the playbook appear hung.
  command: btrfs check --readonly {{ nvme_root_partition }}
  changed_when: false
  when: nvme_ready and nvme_run_btrfs_check and nvme_root_stat.stat.exists


# =============================================================================
# PHASE 3-6 -- Mount, configure, install, unmount (block/always)
# =============================================================================
#
# Everything from the first mount through the last chroot task runs inside a
# block. The always: section runs the unmounts unconditionally -- whether the
# block succeeded, failed, or was skipped. This means /mnt is always cleaned
# up after a run, even if something in the middle fails, so re-running the
# playbook never requires manual umount beforehand.
#
# The rescue: section re-raises the original failure as a fatal error after
# cleanup, so the play still reports failed and does not silently continue.

- name: Mount, configure, install and unmount NVMe (with guaranteed cleanup)
  when: nvme_ready
  block:

    # =========================================================================
    # PHASE 3 -- Mount NVMe under /mnt
    # =========================================================================

    - name: Ensure chroot mount point exists
      file:
        path: "{{ nvme_chroot }}"
        state: directory
        mode: "0755"

    - name: Mount NVMe root partition (btrfs) on {{ nvme_chroot }}
      mount:
        path: "{{ nvme_chroot }}"
        src: "{{ nvme_root_partition }}"
        fstype: btrfs
        state: mounted

    - name: Grow btrfs filesystem to fill enlarged partition
      # After parted extended the partition boundary the btrfs filesystem still
      # thinks it is the old smaller size. btrfs filesystem resize max expands
      # the filesystem metadata to use all available space in the partition.
      # Must be run while the filesystem is mounted. Idempotent -- safe to run
      # again if already at max size.
      command: btrfs filesystem resize max {{ nvme_chroot }}

    - name: Ensure {{ nvme_chroot }}/boot/firmware mount point exists
      file:
        path: "{{ nvme_chroot }}/boot/firmware"
        state: directory
        mode: "0755"

    - name: Mount NVMe boot partition (FAT32) on {{ nvme_chroot }}/boot/firmware
      mount:
        path: "{{ nvme_chroot }}/boot/firmware"
        src: "{{ nvme_boot_partition }}"
        fstype: vfat
        state: mounted

    - name: Bind-mount /proc into chroot
      mount:
        path: "{{ nvme_chroot }}/proc"
        src: /proc
        fstype: none
        opts: bind
        state: mounted

    - name: Bind-mount /sys into chroot
      mount:
        path: "{{ nvme_chroot }}/sys"
        src: /sys
        fstype: none
        opts: bind
        state: mounted

    - name: Bind-mount /dev into chroot
      mount:
        path: "{{ nvme_chroot }}/dev"
        src: /dev
        fstype: none
        opts: bind
        state: mounted

    - name: Bind-mount /dev/pts into chroot
      mount:
        path: "{{ nvme_chroot }}/dev/pts"
        src: /dev/pts
        fstype: none
        opts: bind
        state: mounted

    # =========================================================================
    # PHASE 4 -- Update boot configuration inside the chroot
    # =========================================================================

    - name: Get btrfs UUID of NVMe root partition
      # blkid -p bypasses the kernel UUID cache. After btrfs-convert the NVMe
      # root has a new unique UUID -- -p ensures we read that new value and not
      # the old cached ext4 UUID shared with the SD card.
      command: blkid -p -o value -s UUID {{ nvme_root_partition }}
      register: nvme_root_uuid
      changed_when: false

    - name: Get FAT32 UUID of NVMe boot partition
      command: blkid -p -o value -s UUID {{ nvme_boot_partition }}
      register: nvme_boot_uuid
      changed_when: false

    - name: Report UUIDs
      debug:
        msg:
          - "NVMe boot partition ({{ nvme_boot_partition }}) UUID: {{ nvme_boot_uuid.stdout }}"
          - "NVMe root partition ({{ nvme_root_partition }}) UUID: {{ nvme_root_uuid.stdout }}"

    - name: Update root= parameter in cmdline.txt
      replace:
        path: "{{ nvme_chroot }}/boot/firmware/cmdline.txt"
        regexp: 'root=\S+'
        replace: "root=UUID={{ nvme_root_uuid.stdout }}"

    - name: Update rootfstype= in cmdline.txt
      replace:
        path: "{{ nvme_chroot }}/boot/firmware/cmdline.txt"
        regexp: 'rootfstype=\S+'
        replace: "rootfstype=btrfs"

    - name: Rewrite fstab with correct UUIDs for both NVMe partitions
      # Strip both partition lines and write fresh entries with the correct
      # UUIDs and fstypes. Preserves all other lines (tmpfs, zram, etc.).
      shell: |
        FSTAB="{{ nvme_chroot }}/etc/fstab"
        OTHER=$(grep -v -E '^\s*(UUID=|PARTUUID=|LABEL=|/dev/)[^ ].*\s+(/|/boot/firmware)\s' "$FSTAB" || true)
        {
          echo "# Generated by ipv6_sync ansible role (raspberry_pi)"
          echo "UUID={{ nvme_boot_uuid.stdout }}  /boot/firmware  vfat   defaults  0  2"
          echo "UUID={{ nvme_root_uuid.stdout }}  /               btrfs  defaults  0  1"
          echo "$OTHER"
        } > "$FSTAB"
      args:
        executable: /bin/bash

    - name: Copy resolv.conf into chroot so apt can resolve hostnames
      copy:
        src: /etc/resolv.conf
        dest: "{{ nvme_chroot }}/etc/resolv.conf"
        remote_src: true

    - name: Regenerate initramfs inside chroot
      command: chroot {{ nvme_chroot }} update-initramfs -u -k all

    # =========================================================================
    # PHASE 5 -- Install ipv6_dns_sync inside the chroot
    # =========================================================================

    - name: Remove cdrom apt source inside chroot if present
      lineinfile:
        path: "{{ nvme_chroot }}/etc/apt/sources.list"
        regexp: '^deb cdrom:'
        state: absent

    - name: Install bind9-dnsutils inside chroot
      command: chroot {{ nvme_chroot }} apt-get install -y bind9-dnsutils
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Create ipv6_dns_sync cache directory inside chroot
      file:
        path: "{{ nvme_chroot }}{{ ipv6_cache_dir_linux }}"
        state: directory
        owner: root
        mode: "0700"

    - name: Deploy TSIG key file into chroot
      template:
        src: mykey.j2
        dest: "{{ nvme_chroot }}{{ ipv6_keyfile_linux }}"
        owner: root
        mode: "0600"

    - name: Copy ipv6_dns_sync.py into chroot
      copy:
        src: "{{ playbook_dir }}/../usr/local/bin/ipv6_dns_sync.py"
        dest: "{{ nvme_chroot }}/usr/local/bin/ipv6_dns_sync.py"
        owner: root
        mode: "0755"

    - name: Copy ipv6_dns_watch_linux.sh into chroot
      copy:
        src: "{{ playbook_dir }}/../usr/local/bin/ipv6_dns_watch_linux.sh"
        dest: "{{ nvme_chroot }}/usr/local/bin/ipv6_dns_watch_linux.sh"
        owner: root
        mode: "0755"

    - name: Copy ipv6-dns-watch.service into chroot
      copy:
        src: "{{ playbook_dir }}/../etc/systemd/system/ipv6-dns-watch.service"
        dest: "{{ nvme_chroot }}/etc/systemd/system/ipv6-dns-watch.service"
        owner: root
        mode: "0644"

    - name: Deploy ipv6-dns-cleanup.service into chroot
      template:
        src: ipv6-dns-cleanup.service.j2
        dest: "{{ nvme_chroot }}/etc/systemd/system/ipv6-dns-cleanup.service"
        owner: root
        mode: "0644"

    - name: Enable ipv6-dns-watch service inside chroot
      command: chroot {{ nvme_chroot }} systemctl enable ipv6-dns-watch.service

    - name: Enable ipv6-dns-cleanup service inside chroot
      command: chroot {{ nvme_chroot }} systemctl enable ipv6-dns-cleanup.service

    # =========================================================================
    # PHASE 5b -- Install r8152 driver inside the chroot
    # =========================================================================
    # Mirrors what the r8152 role does on a live system, but all steps run
    # via chroot so the driver is installed into the NVMe root before its
    # first native boot.
    #
    # The build runs inside the chroot so that make uses the NVMe kernel's
    # headers (at /usr/src/linux-headers-* inside the chroot) rather than
    # the SD card's kernel headers, which may be a different version.
    #
    # The modprobe.d config and initramfs regeneration are also done inside
    # the chroot so the blacklist and updated initramfs are in place before
    # the first NVMe boot.

    - name: Install r8152 build dependencies inside chroot
      command: chroot {{ nvme_chroot }} apt-get install -y git build-essential
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Check whether r8152 source directory exists inside chroot
      stat:
        path: "{{ nvme_chroot }}/usr/local/src/realtek-r8152-linux"
      register: r8152_chroot_src_stat

    - name: Clone r8152 driver source inside chroot
      command: >
        chroot {{ nvme_chroot }}
        git clone {{ r8152_repo }} /usr/local/src/realtek-r8152-linux
      when: not r8152_chroot_src_stat.stat.exists

    - name: Update r8152 driver source inside chroot
      command: >
        chroot {{ nvme_chroot }}
        git -C /usr/local/src/realtek-r8152-linux pull
      when: r8152_chroot_src_stat.stat.exists

    - name: Build r8152 kernel module inside chroot
      # make compiles r8152.ko against the NVMe root's kernel headers.
      # This is correct because when the Pi boots natively from NVMe it will
      # be running the NVMe kernel, not the SD card's kernel.
      command: >
        chroot {{ nvme_chroot }}
        make -C /usr/local/src/realtek-r8152-linux

    - name: Install r8152 kernel module inside chroot
      # make install copies r8152.ko.xz into the NVMe's module tree and
      # runs depmod. The Makefile also runs modprobe r8152 at the end but
      # this will fail silently inside the chroot (no running kernel to
      # load into) -- that is expected and harmless.
      command: >
        chroot {{ nvme_chroot }}
        make -C /usr/local/src/realtek-r8152-linux install
      failed_when: false

    - name: Deploy realtek-usb modprobe config inside chroot
      copy:
        src: "{{ playbook_dir }}/../ansible/roles/r8152/files/realtek-usb.conf"
        dest: "{{ nvme_chroot }}/etc/modprobe.d/realtek-usb.conf"
        owner: root
        group: root
        mode: "0644"

    - name: Regenerate initramfs inside chroot (includes r8152 blacklist)
      # Regenerate again now that the modprobe.d blacklist is in place so
      # it is embedded in the initramfs before first boot.
      # The "fsck.btrfs doesn't exist" warnings are harmless.
      command: chroot {{ nvme_chroot }} update-initramfs -u -k all

  rescue:
    # The block failed. The always: section below will unmount everything.
    # Here we just re-raise the failure so the play reports failed and stops.
    - name: Re-raise failure after cleanup
      fail:
        msg: >-
          A task in the NVMe preparation block failed.
          All mounts have been cleaned up (see always: section).
          Fix the error above and re-run the playbook.

  always:
    # =========================================================================
    # PHASE 6 -- Unmount (always runs, even on failure)
    # =========================================================================
    # Unmount in strict reverse order: deepest mounts first, root last.
    # Each task uses failed_when: false so a missing mount does not abort
    # the cleanup sequence -- if a mount was never made, umount simply
    # exits non-zero and we continue to the next one.

    - name: Unmount /dev/pts from chroot
      command: umount {{ nvme_chroot }}/dev/pts
      failed_when: false
      changed_when: false

    - name: Unmount /dev from chroot
      command: umount {{ nvme_chroot }}/dev
      failed_when: false
      changed_when: false

    - name: Unmount /sys from chroot
      command: umount {{ nvme_chroot }}/sys
      failed_when: false
      changed_when: false

    - name: Unmount /proc from chroot
      command: umount {{ nvme_chroot }}/proc
      failed_when: false
      changed_when: false

    - name: Unmount NVMe boot partition
      command: umount {{ nvme_chroot }}/boot/firmware
      failed_when: false
      changed_when: false

    - name: Unmount NVMe root partition
      command: umount {{ nvme_chroot }}
      failed_when: false
      changed_when: false

    - name: NVMe preparation complete
      debug:
        msg: >-
          NVMe boot preparation is complete. The machine is ready to shut down.
          Remove the SD card before powering back on and the Pi will boot from
          the NVMe drive.
      when: nvme_ready
