---
# =============================================================================
# roles/raspberry_pi/defaults/main.yml — Raspberry Pi role default variables
# =============================================================================
#
# Override any of these in inventory/host_vars/<hostname>.yml for a specific
# Pi, or in inventory/group_vars/raspberry_pi.yml to apply to all Pis.

# Target device auto-detection
# =============================================================================
# By default the role auto-detects the target device by scanning for a block
# device (other than the current boot device) with the standard pi-manager
# partition layout:
#   - a FAT32 partition labelled 'bootfs'
#   - an ext4 partition labelled 'rootfs'
#
# The default values below (/dev/nvme0n1 etc.) act as a sentinel -- when the
# role sees these defaults it runs auto-detection. Set all three explicitly in
# host_vars to override auto-detection and target a specific device.
#
# Example override in host_vars/<hostname>.yml:
#   nvme_device: /dev/sda
#   nvme_boot_partition: /dev/sda1
#   nvme_root_partition: /dev/sda2

# The target block device (whole disk, not a partition).
nvme_device: /dev/nvme0n1

# The FAT32 boot partition -- stays as-is, mounted at /boot/firmware.
# Contains cmdline.txt, config.txt, initramfs images, and the bootloader.
nvme_boot_partition: /dev/nvme0n1p1

# The root partition -- ext4, will be converted to btrfs then grown to fill
# the disk after MBR->GPT conversion if needed.
nvme_root_partition: /dev/nvme0n1p2

# Mount point used as the chroot root during preparation.
nvme_chroot: /mnt

# Run e2fsck -fy on the ext4 partition before btrfs-convert.
# Enabled by default -- pi-manager leaves the filesystem requiring recovery
# after the first-boot wizard runs, and btrfs-convert will refuse to proceed
# without a clean e2fsck first. Safe to run on already-clean filesystems
# (exits 0 with no changes). Disable in host_vars only if you are certain
# the filesystem is clean and want to skip the extra step.
nvme_run_e2fsck: true

# Run btrfs check --readonly after conversion to verify filesystem integrity.
# Disabled by default -- on a 4TB drive this walks the entire filesystem tree
# and can take 20-30+ minutes, making the playbook appear hung.
nvme_run_btrfs_check: false

# Maximum time in seconds to wait for btrfs-convert to complete.
# Tested at ~10 minutes on a 4TB NVMe at 5% usage on a Pi 500.
# Raise this if your drive is larger or more heavily populated.
nvme_convert_timeout: 3600

# =============================================================================
# r8152 driver variables (mirrored from r8152 role defaults)
# =============================================================================
# The raspberry_pi role installs the r8152 driver into the NVMe chroot during
# Phase 5b. These must match the r8152 role defaults (or host_vars overrides).

# Git repository for the out-of-tree r8152 driver.
r8152_repo: https://github.com/wget/realtek-r8152-linux.git

# =============================================================================
# ipv6_dns_sync variables (mirrored from ipv6_dns_sync role defaults)
# =============================================================================
# The raspberry_pi role installs ipv6_dns_sync into the NVMe chroot during
# Phase 5. It needs these variables from the ipv6_dns_sync role, but Ansible
# does not automatically make one role's defaults available to another role.
# These values must match the ipv6_dns_sync role defaults (or host_vars
# overrides) exactly -- if you override them for ipv6_dns_sync, override
# them here too.

ipv6_sync_config_url: "https://a02.au/ipv6_sync_config/config.json"
ipv6_tsig_key: "****TSIG_KEY****"
ipv6_tsig_key_name: "ivarkey"
ipv6_tsig_key_algorithm: "hmac-sha256"
ipv6_keyfile_linux: "/root/.mykey"
ipv6_cache_dir_linux: "/root/.cache/ipv6_dns_sync"
