---
# =============================================================================
# site.yml — Main deployment playbook
# =============================================================================
#
# Deploys ipv6_dns_sync to all hosts. Automatically handles platform
# differences:
#   - macOS hosts (in the 'macos' inventory group): runs the Homebrew
#     bootstrap first (installs Homebrew + Python 3 if not present),
#     then deploys the scripts and launchd service.
#   - Linux hosts (in the 'linux' inventory group): installs dependencies
#     via apt and deploys the scripts and systemd service.
#
# Usage:
#   Deploy to all hosts:
#     ansible-playbook ansible/site.yml
#
#   Deploy to a single host:
#     ansible-playbook ansible/site.yml --limit myhostname
#
#   Dry run (show what would change without making any changes):
#     ansible-playbook ansible/site.yml --check

# -----------------------------------------------------------------------------
# Stage 1: macOS bootstrap (macOS hosts only)
# -----------------------------------------------------------------------------
# Runs the Homebrew bootstrap via SSH from the controller as the regular user.
# Skipped entirely if there are no macOS hosts in the current --limit.
# Safe to run on already-bootstrapped Macs — skips cleanly if Homebrew
# and Python are already installed.

- name: Bootstrap macOS hosts
  hosts: macos
  gather_facts: false
  become: false

  tasks:

    - name: Check SSH connectivity from controller to Mac
      local_action:
        module: command
        cmd: ssh -o BatchMode=yes -o ConnectTimeout=5 {{ ansible_user }}@{{ inventory_hostname }} echo ok
      register: ssh_check
      changed_when: false
      failed_when: false

    - name: Fail with helpful message if SSH not working
      fail:
        msg: >
          Cannot SSH to {{ inventory_hostname }} as {{ ansible_user }} without a password.
          Please add your public SSH key to ~/.ssh/authorized_keys on the Mac and rerun.
          On the Mac run:
            mkdir -p ~/.ssh
            curl https://github.com/{{ ansible_user }}.keys >> ~/.ssh/authorized_keys
            chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys
      when: ssh_check.rc != 0

    - name: Install Homebrew and Python 3 on Mac (via SSH from controller)
      local_action:
        module: command
        cmd: ssh {{ ansible_user }}@{{ inventory_hostname }} 'bash -s'
        stdin: "{{ lookup('file', playbook_dir + '/../scripts/bootstrap-macos.sh') }}"
      register: brew_bootstrap
      changed_when: "'already installed' not in brew_bootstrap.stdout"

    - name: Show bootstrap output
      debug:
        msg: "{{ brew_bootstrap.stdout_lines }}"
      when: brew_bootstrap.stdout_lines is defined

# -----------------------------------------------------------------------------
# Stage 2: Deploy to all hosts
# -----------------------------------------------------------------------------
# Deploys scripts, TSIG key, and service to all hosts. The role detects the
# OS automatically and runs the correct tasks for each platform.

- name: Deploy ipv6_dns_sync
  hosts: all
  become: true

  roles:
    - ipv6_dns_sync

# -----------------------------------------------------------------------------
# Stage 3: Raspberry Pi NVMe preparation (Raspberry Pi hosts only)
# -----------------------------------------------------------------------------
# Runs only on hosts in the 'raspberry_pi' inventory group.
#
# Detects how the Pi is booted:
#
#   Booted from SD card or USB stick (root not on NVMe):
#     Runs the full migration sequence:
#       1.  e2fsck -fy          clean ext4 filesystem before conversion
#       2.  btrfs-convert       convert ext4 -> btrfs in-place
#       3.  gdisk               convert MBR -> GPT (required for drives >2TB)
#       4.  parted resizepart   grow partition to fill the NVMe device
#       5.  mount + btrfs resize max
#       6.  Update cmdline.txt  new btrfs UUID and rootfstype=btrfs
#       7.  Rewrite fstab       correct UUIDs, optimised btrfs mount options
#       8.  update-initramfs    rebuild initramfs inside chroot
#       9.  Install ipv6_dns_sync into the chroot
#       10. Build + install r8152 driver into the chroot
#       11. Unmount everything  machine ready to shut down and remove boot media
#
#   Already booted from NVMe:
#     Skips migration, performs a normal live ipv6_dns_sync install instead.
#
# All steps are idempotent -- safe to re-run. Cleanup on failure is guaranteed
# by a block/rescue/always structure that always unmounts /mnt on exit.
#
# To add a Pi, add it to BOTH the 'linux' AND 'raspberry_pi' inventory groups.

- name: Raspberry Pi NVMe preparation
  hosts: raspberry_pi
  become: true

  roles:
    - raspberry_pi

# -----------------------------------------------------------------------------
# Stage 4: Realtek r8152 USB network driver (r8152 hosts only)
# -----------------------------------------------------------------------------
# Runs only on hosts in the 'r8152' inventory group.
#
# Builds and installs the out-of-tree r8152 driver from the
# wget/realtek-r8152-linux repository, and deploys a modprobe.d config that
# blacklists the generic cdc_ncm/cdc_ether drivers so the Realtek adapter
# is claimed by the correct driver at boot.
#
# Confirmed working with:
#   - Realtek r8157 USB 2.5G adapter
#   - Raspberry Pi 500, Debian Trixie (6.12.47+rpt-rpi-2712)
#
# To add a host, add it to the 'r8152' inventory group. It does not need to
# be a Raspberry Pi -- any Linux host with a Realtek USB adapter can use this.

- name: Realtek r8152 USB driver installation
  hosts: r8152
  become: true

  roles:
    - r8152
